# DogeOS bridge signer policy.
# Loaded by generate-bridge-info-cli from GenerateBridgeInfo.toml.
# Top-level config lives under [default] because the loader treats top-level
# tables as Figment profiles.

[default]
network = "testnet"
timelock = 100

# TEE single-signer pubkey, compressed secp256k1 public key hex.
tee_pubkey = "0279be667ef9dcbbac55a06295ce870b07029bfcdb2dce28d959f2815b16f81798"

# 20-byte bridge namespace id. For production, compute this from the genesis
# sequencer outpoint with compute-bridge-namespace-cli and replace this zero
# placeholder before generating bridge.json.
namespace_id = [
  0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
  0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00,
]

[default.attestation]
threshold = 2
pubkeys = [
  "02c6047f9441ed7d6d3045406e95c07cd85c778e4b8cef3ca7abac09b95c709ee5",
  "03fff97bd5755eeea420453a14355235d382f6472f8568a18b2f057a1460297556",
]

[default.recovery]
threshold = 2
pubkeys = [
  "0279be667ef9dcbbac55a06295ce870b07029bfcdb2dce28d959f2815b16f81798",
  "02c6047f9441ed7d6d3045406e95c07cd85c778e4b8cef3ca7abac09b95c709ee5",
]

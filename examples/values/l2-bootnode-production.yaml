image:
  repository: scrolltech/l2geth
  pullPolicy: IfNotPresent
  tag: scroll-v5.10.2

global:
  fullnameOverride: l2-bootnode-__INSTANCE_INDEX__

envFrom:
  - configMapRef:
      name: "l2-bootnode-__INSTANCE_INDEX__-env"
  - secretRef:
      name: "l2-bootnode-__INSTANCE_INDEX__-secret-env"

initContainers:
  wait-for-l1:
    image: scrolltech/scroll-alpine:v0.0.1
    command:
      - /bin/sh
      - -c
      - /wait-for-l1.sh $L2GETH_L1_ENDPOINT
    envFrom:
      - configMapRef:
          name: "l2-bootnode-__INSTANCE_INDEX__-env"
    volumeMounts:
      - name: wait-for-l1-script
        mountPath: /wait-for-l1.sh
        subPath: wait-for-l1.sh

persistence:
  env:
    enabled: true
    type: configMap
    mountPath: /config/
    name: "l2-bootnode-__INSTANCE_INDEX__-env"
  data:
    size: 1000Gi
    retain: true

configMaps:
  env:
    enabled: true
    data:
      CHAIN_ID: ""
      # L2GETH_NODEKEY is now sourced from a Kubernetes Secret
      L2GETH_L1_CONTRACT_DEPLOYMENT_BLOCK: ""
      L2GETH_L1_ENDPOINT: "http://l1-interface:8545"
      L2GETH_DA_BLOB_BEACON_NODE: "http://l1-interface:5052"
      L2GETH_PEER_LIST: "[]"

externalSecrets:
  l2-bootnode-__INSTANCE_INDEX__-secret-env:
    provider: aws
    data:
      - remoteRef:
          key: scroll/l2-bootnode-__INSTANCE_INDEX__
          property: L2GETH_NODEKEY
        secretKey: L2GETH_NODEKEY
    refreshInterval: 2m
    serviceAccount: external-secrets

service:
  p2p:
    enabled: true

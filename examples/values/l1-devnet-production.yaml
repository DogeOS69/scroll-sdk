global:
  fullnameOverride: l1-devnet

envFrom:
  - configMapRef:
      name: l1-devnet-env

persistence:
  env:
    enabled: true
    type: configMap
    mountPath: /config/
    name: l1-devnet-env
  data:
    enabled: true
    accessMode: "ReadWriteOnce"
    size: "10Gi"
    mountPath: "/data"
configMaps:
  env:
    enabled: true
    data:
      CHAIN_ID: ""

image:
  repository: ghcr.io/foundry-rs/foundry
  tag: v1.1.0
  pullPolicy: IfNotPresent

securityContext:
  runAsUser: 0
  fsGroup: 0
resources:
  limits:
    memory: "2Gi"
    cpu: "1000m"
  requests:
    memory: "1Gi"
    cpu: "500m"
command:
  - bash
  - -c
  - 'mkdir -p /data && echo "{number: 0x0}" > /data/genesis.json && anvil --host 0.0.0.0 --port 8545 --chain-id ${CHAIN_ID} --state /data/state.json --state-interval 60 --slots-in-an-epoch 3 --hardfork cancun'

ingress:
  main:
    ingressClassName: "nginx"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
---
global:
  fullnameOverride: l1-devnet

network:
  chainId: 32382
  networkId: 32382

storageClass: local-path

genesis:
  storage: 2Gi

geth:
  storage: 20Gi
  resources:
    limits:
      memory: "4Gi"
      cpu: "2"
    requests:
      memory: "1Gi"
      cpu: "500m"

lighthouse:
  storage: 20Gi
  resources:
    limits:
      memory: "4Gi"
      cpu: "2"
    requests:
      memory: "1Gi"
      cpu: "500m"

validator:
  resources:
    limits:
      memory: "2Gi"
      cpu: "1"
    requests:
      memory: "512Mi"
      cpu: "250m"

ingress:
  main:
    ingressClassName: "nginx"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix

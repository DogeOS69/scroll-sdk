image:
  repository: dogeos69/cubesigner-signer
  pullPolicy: IfNotPresent
  tag: 0.2.0-rc.2

global:
  fullnameOverride: "cubesigner-signer-__INSTANCE_INDEX__"
env:
  - name: "DOGEOS_CUBESIGNER_SIGNER_PORT"
    value: "3000"
  - name: "DOGEOS_CUBESIGNER_SIGNER_NETWORK"
    value: "testnet"
  - name: "DOGEOS_CUBESIGNER_SIGNER_TSO_URL"
    value: "http://tso-service:3000"
  - name: "DOGEOS_CUBESIGNER_SIGNER_SIGNATURE_DELAY"
    value: "0"
  - name: "DOGEOS_CUBESIGNER_SIGNER_POLL_INTERVAL"
    value: "5000"
  - name: "DOGEOS_CUBESIGNER_SIGNER_CS_KEY_ID"
    valueFrom:
      secretKeyRef:
        name: "cubesigner-signer-__INSTANCE_INDEX__-env"
        key: "DOGEOS_CUBESIGNER_SIGNER_CS_KEY_ID"
  - name: "DOGEOS_CUBESIGNER_SIGNER_CS_SESSION_PATH"
    value: "/etc/cubesigner/session.json"
  - name: "DOGEOS_CUBESIGNER_SIGNER_BODY_LIMIT"
    value: "5mb"

persistence:
  session:
    name: "cubesigner-signer-__INSTANCE_INDEX__-session"
    enabled: true
    type: "secret"
    secretName: "cubesigner-signer-__INSTANCE_INDEX__-session"
    mountPath: "/etc/cubesigner"
    readOnly: true
volumeClaimTemplates:
  - name: "session-cache-__INSTANCE_INDEX__"
    accessMode: "ReadWriteOnce"
    size: "1Gi"
    mountPath: "/app/.sessions"
externalSecrets:
  cubesigner-signer-__INSTANCE_INDEX__-env:
    provider: "aws"
    data:
      - remoteRef:
          key: "dogeos/cubesigner-signer-__INSTANCE_INDEX__-env"
          property: "DOGEOS_CUBESIGNER_SIGNER_CS_KEY_ID"
        secretKey: "DOGEOS_CUBESIGNER_SIGNER_CS_KEY_ID"
    refreshInterval: "2m"
    serviceAccount: "external-secrets"
    secretRegion: "us-west-2"
  cubesigner-signer-__INSTANCE_INDEX__-session:
    provider: "aws"
    data:
      - remoteRef:
          key: "dogeos/cubesigner-signer-__INSTANCE_INDEX__-session"
          property: "session.json"
        secretKey: "session.json"
    refreshInterval: "2m"
    serviceAccount: "external-secrets"
    secretRegion: "us-west-2"
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "1000m"
serviceMonitor:
  main:
    enabled: false

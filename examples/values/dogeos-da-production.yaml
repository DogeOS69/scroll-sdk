global:
  nameOverride: &app_name dogeos-da
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/da-publisher
  pullPolicy: IfNotPresent
  tag: latest

env:
  - name: RUST_LOG
    value: "debug"
  - name: DOGEOS_DA_PUBLISHER_CELESTIA_RPC_URL
    value: "celestia-testnet-mocha:26658"
  - name: DOGEOS_DA_PUBLISHER_CELESTIA_NAMESPACE
    value: "98E6DED48612C0B8E4FA"
  - name: DOGEOS_DA_PUBLISHER_DOGEOS_L2_RPC_URL
    value: "http://l2-rpc:8545"
  - name: DOGEOS_DA_PUBLISHER_ENABLE_WITHDRAWAL_ROOT_FETCHING
    value: "true"
service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000

defaultProbes: &default_probes
  enabled: true
  custom: true
  spec:
    httpGet:
      path: "/healthz"
      port: 3000

probes:
  liveness:
    <<: *default_probes
  readiness:
    <<: *default_probes
  startup:
    <<: *default_probes


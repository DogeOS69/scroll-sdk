global:
  nameOverride: "dogeos-da"
  fullnameOverride: "dogeos-da"
controller:
  type: "statefulset"
  replicas: 1
  strategy: "RollingUpdate"
image:
  repository: "dogeos69/da-publisher"
  pullPolicy: "IfNotPresent"
  tag: "v0.2.0-alpha.1"
env:
  - name: "RUST_LOG"
    value: "debug"
  - name: "DOGEOS_DA_PUBLISHER_CELESTIA_RPC_URL"
    value: "celestia-testnet-mocha:26658"
  - name: "DOGEOS_DA_PUBLISHER_CELESTIA_NAMESPACE"
    value: ""
  - name: "DOGEOS_DA_PUBLISHER_DOGEOS_L2_RPC_URL"
    value: "http://l2-rpc:8545"
  - name: "DOGEOS_DA_PUBLISHER_ENABLE_WITHDRAWAL_ROOT_FETCHING"
    value: "false"
service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000
defaultProbes:
  enabled: true
  custom: true
  spec:
    httpGet:
      path: "/healthz"
      port: 3000
probes:
  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/healthz"
        port: 3000
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/healthz"
        port: 3000
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/healthz"
        port: 3000
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
serviceMonitor:
  main:
    enabled: true

image:
  repository: ghcr.io/unifralabs/metrics-exporter
  pullPolicy: IfNotPresent
  tag: v0.1.3

metricsConfig:
  rollup:
    url: "http://rollup-explorer-backend"
  l1Network:
    url: "http://l1-devnet:8545"
    L1_MESSAGE_QUEUE_PROXY_ADDR: ""
  dogecoin:
    url: "http://dogecoin:44555"
  dogeos:
    url: "http://l2-rpc:8545"
    L2_TX_FEE_VAULT_ADDR: ""
    L2_BRIDGE_FEE_RECIPIENT_ADDR: ""

# External Secrets configuration
externalSecrets:
  metrics-exporter-secret-env:
    provider: aws
    data:
      - remoteRef:
          key: scroll/metrics-exporter-secret-env
          property: METRICS_EXPORTER_DOGECOIN_BASIC_AUTH
        secretKey: DOGECOIN_RPC_TOKEN
    refreshInterval: 2m
    serviceAccount: external-secrets

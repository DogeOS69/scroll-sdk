image:
  repository: dogeos69/scroll-stack-contracts
  tag: deploy-b9605373dc10fdfcdd34c231148cfe2dedab9849

configMaps:
  contracts-deployment-env:
    enabled: true
    data:
      L1_RPC_ENDPOINT: ""
      L2_RPC_ENDPOINT: "http://l2-rpc:8545"
      CHAIN_ID_L1: ""
      CHAIN_ID_L2: ""

envFrom:
  - secretRef:
      name: contracts-secret-env
  - configMapRef:
      name: contracts-deployment-env

externalSecrets:
  contracts-secret-env:
    provider: aws
    data:
      - remoteRef:
          key: scroll/contracts-secret-env
          property: DEPLOYER_PRIVATE_KEY
        secretKey: DEPLOYER_PRIVATE_KEY
      - remoteRef:
          key: scroll/contracts-secret-env
          property: L1_COMMIT_SENDER_PRIVATE_KEY
        secretKey: L1_COMMIT_SENDER_PRIVATE_KEY
      - remoteRef:
          key: scroll/contracts-secret-env
          property: L1_FINALIZE_SENDER_PRIVATE_KEY
        secretKey: L1_FINALIZE_SENDER_PRIVATE_KEY
      - remoteRef:
          key: scroll/contracts-secret-env
          property: L1_GAS_ORACLE_SENDER_PRIVATE_KEY
        secretKey: L1_GAS_ORACLE_SENDER_PRIVATE_KEY
      - remoteRef:
          key: scroll/contracts-secret-env
          property: L2_GAS_ORACLE_SENDER_PRIVATE_KEY
        secretKey: L2_GAS_ORACLE_SENDER_PRIVATE_KEY
      - remoteRef:
          key: scroll/contracts-secret-env
          property: COORDINATOR_JWT_SECRET_KEY
        secretKey: COORDINATOR_JWT_SECRET_KEY
    refreshInterval: 2m
    serviceAccount: external-secrets

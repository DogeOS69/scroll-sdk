blockscout-stack:
  blockscout:

    env:
      ETHEREUM_JSONRPC_HTTP_URL: http://l2-rpc:8545
      ETHEREUM_JSONRPC_TRACE_URL: http://l2-rpc:8545
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_WS_URL: ws://l2-rpc:8546
      # BLOCK_TRANSFORMER: clique
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: true
      CHAIN_TYPE: scroll
      COIN: "DOGE"
      COIN_NAME: "DOGE"
      INDEXER_SCROLL_L1_CHAIN_CONTRACT: ""  # value of L1_SCROLL_CHAIN_PROXY_ADDR on config-contracts.toml
      INDEXER_SCROLL_L1_BATCH_START_BLOCK: ""  # value of L1_CONTRACT_DEPLOYMENT_BLOCK on config.toml
      INDEXER_SCROLL_L1_MESSENGER_CONTRACT: ""  # value of L1_SCROLL_MESSENGER_PROXY_ADDR on config-contracts.toml
      INDEXER_SCROLL_L1_MESSENGER_START_BLOCK: ""  # value of L1_CONTRACT_DEPLOYMENT_BLOCK on config.toml
      INDEXER_SCROLL_L2_MESSENGER_CONTRACT: ""  # value of L2_SCROLL_MESSENGER_PROXY_ADDR on config-contracts.toml
      INDEXER_SCROLL_L2_GAS_ORACLE_CONTRACT: ""  # value of L1_GAS_PRICE_ORACLE_PROXY_ADDR on config-contracts.toml
      INDEXER_SCROLL_L1_RPC: ""
      INDEXER_SCROLL_L2_MESSENGER_START_BLOCK: 0
      INDEXER_SCROLL_L1_ETH_GET_LOGS_RANGE_SIZE: 500
      INDEXER_SCROLL_L2_ETH_GET_LOGS_RANGE_SIZE: 500
      SCROLL_L2_CURIE_UPGRADE_BLOCK: 0
      ECTO_USE_SSL: true
      ETHEREUM_JSONRPC_HTTP_INSECURE: false

    envFrom:
      - secretRef:
          name: blockscout-secret-env

    extraEnv:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: blockscout-secret-env
            key: DATABASE_URL

    ingress:
      enabled: true
      className: "nginx"
      annotations:  # Add annotations here. Might be necessary to allow CORS from updated-gas-oracle. Example below
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://blockscout.scrollsdk"
        nginx.ingress.kubernetes.io/cors-allow-headers: "updated-gas-oracle, Content-Type, Authorization"
        nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
        nginx.ingress.kubernetes.io/cors-max-age: "86400"
      hostname: "blockscout.scrollsdk"
      paths:
        - path: "/api"
          pathType: "Prefix"
      tls:
        enabled: true
        secretName: blockscout-tls  # Set here the name of the secret. Example : blockscout.scrollsdk

  frontend:
    env:
      NEXT_PUBLIC_API_PROTOCOL: https
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: wss
      NEXT_PUBLIC_API_HOST: "blockscout.scrollsdk" # Backend host, example  "blockscout.scrollsdk"
      NEXT_PUBLIC_APP_PROTOCOL: https
      NEXT_PUBLIC_NETWORK_ID: ""
      NEXT_PUBLIC_NETWORK_NAME: "DogeOS Devnet"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "DogeOS"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "Dogecoin"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "DOGE"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      PROMETHEUS_METRICS_ENABLED: "false"
      FAVICON_MASTER_URL: "https://raw.githubusercontent.com/dogeos69/web-images/main/dogeos_favicon.png"
      NEXT_PUBLIC_AD_BANNER_PROVIDER: "none"
      NEXT_PUBLIC_AD_TEXT_PROVIDER: "none"
      NEXT_PUBLIC_NETWORK_LOGO: "https://raw.githubusercontent.com/dogeos69/web-images/main/dogeos_logo.svg"
      NEXT_PUBLIC_NETWORK_LOGO_DARK: "https://raw.githubusercontent.com/dogeos69/web-images/main/dogeos_logo_white.svg"
      NEXT_PUBLIC_NETWORK_ICON: "https://raw.githubusercontent.com/dogeos69/web-images/main/dogeos_icon.svg"
      NEXT_PUBLIC_NETWORK_ICON_DARK: "https://raw.githubusercontent.com/dogeos69/web-images/main/dogeos_icon.svg"
      NEXT_PUBLIC_OG_IMAGE_URL: "https://raw.githubusercontent.com/dogeos69/web-images/main/dogeos_icon.png"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "[\"daily_txs\"]"
      NEXT_PUBLIC_HOMEPAGE_STATS: "[\"total_blocks\", \"average_block_time\", \"total_txs\", \"wallet_addresses\", \"gas_tracker\"]"
      NEXT_PUBLIC_HOMEPAGE_HERO_BANNER_CONFIG: "{'background':['rgba(255, 238, 218, 1)'], 'text_color':['rgba(25, 6, 2, 1)']}"
    ingress:
      enabled: true
      className: "nginx"  # Set here your ingress class name
      annotations:  # Add annotations here. Might be necessary to allow CORS from updated-gas-oracle. Example below
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://blockscout.scrollsdk"
        nginx.ingress.kubernetes.io/cors-allow-headers: "updated-gas-oracle, Content-Type, Authorization"
        nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
        nginx.ingress.kubernetes.io/cors-max-age: "86400"
      hostname: "blockscout.scrollsdk"  # Set the hostname for the frontend. Example : blockscout.scrollsdk
      paths:
        - path: "/"
          pathType: "Prefix"
      tls:
        enabled: true
        secretName: blockscout-front-tls  # Set here the hostname for the ingress. Example : blockscout.scrollsdk

externalSecrets:
  blockscout-secret-env:
    provider: aws
    data:
      - remoteRef:
          key: scroll/blockscout-secret-env
          property: DATABASE_URL
        secretKey: DATABASE_URL
    refreshInterval: 2m
    serviceAccount: external-secrets

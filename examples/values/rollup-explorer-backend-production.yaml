controller:
  replicas: 2

ingress:
  main:
    ingressClassName: "nginx"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix

resources:
  requests:
    memory: "200Mi"
    cpu: "50m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

externalSecrets:
  rollup-explorer-backend-secret-env:
    enabled: true
    provider: aws
    data:
      - remoteRef:
          key: scroll/rollup-explorer-backend-secret-env
        secretKey: rollup-explorer-backend-secret-config
    refreshInterval: 2m
    serviceAccount: external-secrets

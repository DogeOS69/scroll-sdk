image:
  repository: scrolltech/l2geth
  pullPolicy: IfNotPresent
  tag: scroll-v5.10.2

global:
  fullnameOverride: l2-rpc

envFrom:
  - configMapRef:
      name: l2-rpc-env

initContainers:
  1-wait-for-l1:
    image: scrolltech/scroll-alpine:v0.0.1
    command:
      - /bin/sh
      - -c
      - /wait-for-l1.sh $L2GETH_L1_ENDPOINT
    envFrom:
      - configMapRef:
          name: l2-rpc-env
    volumeMounts:
      - name: wait-for-l1-script
        mountPath: /wait-for-l1.sh
        subPath: wait-for-l1.sh

volumeClaimTemplates:
  - name: data
    accessMode: "ReadWriteOnce"
    size: "1000Gi"
    mountPath: "/l2geth/data"

configMaps:
  env:
    enabled: true
    data:
      CHAIN_ID: ""
      L2GETH_L1_ENDPOINT: ""
      L2GETH_DA_BLOB_BEACON_NODE: ""
      L2GETH_L1_CONTRACT_DEPLOYMENT_BLOCK: ""
      L2GETH_PEER_LIST: ""
      # Required during preinstalls bring-up: Multicall3 + CreateX deploy via
      # pre-EIP-155 legacy txs which geth rejects by default. Recommended to
      # remove this flag once preinstalls have been deployed and verified —
      # leaving it on permanently exposes any future legacy tx to cross-chain
      # replay risk.
      L2GETH_EXTRA_PARAMS: "--rpc.allow-unprotected-txs"

ingress:
  main:
    ingressClassName: "nginx"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
  websocket:
    ingressClassName: "nginx"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
            service:
              port: 8546
resources:
  requests:
    memory: "1Gi"
    cpu: "100m"
  limits:
    memory: "4Gi"
    cpu: "1"

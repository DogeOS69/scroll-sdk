global:
  fullnameOverride: l2-sequencer-0

resources:
  requests:
    memory: "150Mi"
    cpu: "50m"
  limits:
    memory: "8Gi"
    cpu: "4"

envFrom:
  - configMapRef:
      name: l2-sequencer-0-env
  - secretRef:
      name: l2-sequencer-secret-0-env

initContainers:
  wait-for-l1:
    image: scrolltech/scroll-alpine:v0.0.1
    command:
      - /bin/sh
      - -c
      - /wait-for-l1.sh $L2GETH_L1_ENDPOINT
    envFrom:
      - configMapRef:
          name: l2-sequencer-0-env
    volumeMounts:
      - name: wait-for-l1-script
        mountPath: /wait-for-l1.sh
        subPath: wait-for-l1.sh

service:
  # Dedicated P2P service for external access
  p2p:
    enabled: true
    type: LoadBalancer
    ports:
      p2p-tcp:
        enabled: true
        port: 30303
        targetPort: 30303
        protocol: TCP
      p2p-udp:
        enabled: true
        port: 30303
        targetPort: 30303
        protocol: UDP
          # Cloud provider specific annotations (enable based on your cloud platform)
      annotations:
        # === AWS Static IP Configuration ===
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
        # Use pre-allocated Elastic IPs (replace with your actual EIP allocation IDs)
        service.beta.kubernetes.io/aws-load-balancer-eip-allocations: "eipalloc-0d8f84d65cf83f339"
     
        # === Alternative Cloud Provider Static IP Configurations ===
        # === GCP Static IP ===
        # cloud.google.com/load-balancer-type: "External"
        # cloud.google.com/load-balancer-ip: "YOUR_RESERVED_STATIC_IP"
     
        # === Azure Static IP ===
        # service.beta.kubernetes.io/azure-load-balancer-internal: "false"
        # service.beta.kubernetes.io/azure-pip-name: "sequencer-0-p2p-ip"
        # service.beta.kubernetes.io/azure-pip-resource-group: "YOUR_RESOURCE_GROUP"
     
        # === Alibaba Cloud Static IP ===
        # service.beta.kubernetes.io/alibaba-cloud-loadbalancer-spec: "slb.s1.small"
        # service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: "internet"
        # service.beta.kubernetes.io/alibaba-cloud-loadbalancer-id: "YOUR_SLB_INSTANCE_ID"

configMaps:
  env:
    enabled: true
    data:
      CHAIN_ID: ""
      L2GETH_L1_ENDPOINT: ""
      L2GETH_L1_CONTRACT_DEPLOYMENT_BLOCK: ""
      L2GETH_SIGNER_ADDRESS: ""
      L2GETH_PEER_LIST: '[""]'
      L2GETH_CCC_NUMWORKERS: ""

persistence:
  env:
    enabled: true
    type: configMap
    name: l2-sequencer-0-env

externalSecrets:
  l2-sequencer-secret-0-env:
    provider: aws
    data:
      - remoteRef:
          key: scroll/l2-sequencer-secret-env
          property: L2GETH_KEYSTORE_0
        secretKey: L2GETH_KEYSTORE
      - remoteRef:
          key: scroll/l2-sequencer-secret-env
          property: L2GETH_PASSWORD_0
        secretKey: L2GETH_PASSWORD
      - remoteRef:
          key: scroll/l2-sequencer-secret-env
          property: L2GETH_NODEKEY_0
        secretKey: L2GETH_NODEKEY
    refreshInterval: 2m
    serviceAccount: external-secrets

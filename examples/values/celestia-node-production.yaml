image:
  repository: "ghcr.io/celestiaorg/celestia-node"
  tag: "v0.30.2-mocha"
  pullPolicy: IfNotPresent

#DEBUG, INFO, WARN, ERROR, DPANIC, PANIC, FATAL
logLevel: "INFO"
network: "mocha"
node_type: "light"
core:
  rpc_url: rpc-mocha.pops.one
  grpc_port: 9090

# Optional: Your wallet's mnemonic phrase for key restoration
# If not provided, a random key will be generated on first startup and persisted
# use --set mnemonic="<your mnemonic here>" to set the mnemonic via helm install
mnemonic: ""

storage:
  size: "220Gi"
  retainPvcOnUninstall: true

service:
  type: "ClusterIP"
  ports:
    p2p-tcp:
      enabled: true
      port: 2121
      targetPort: 2121
      protocol: TCP
    p2p-udp:
      enabled: true
      port: 2121
      targetPort: 2121
      protocol: UDP
    rpc:
      enabled: true
      port: 26658
      targetPort: 26658
      protocol: TCP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - secretName: "celestia-tls"
      hosts:
        - ""

resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

rpc:
  auth:
    skipAuth: true

# External Secrets configuration for managing sensitive data
externalSecrets:
  celestia-node-secret-env:
    provider: aws
    refreshInterval: 2m
    serviceAccount: external-secrets
    data:
      - remoteRef:
          key: scroll/celestia-node-secret-env
          property: mnemonic
        secretKey: mnemonic
      - remoteRef:
          key: scroll/celestia-node-secret-env
          property: x-token
        secretKey: x-token

configToml: |
  [Node]
  StartupTimeout = "20s"
  ShutdownTimeout = "20s"

  [Core]
  IP = ""
  Port = "9090"
  TLSEnabled = false
  XTokenPath = ""
  AdditionalCoreEndpoints = []

  [State]
  DefaultKeyName = "my_celes_key"
  DefaultBackendName = "test"
  EstimatorAddress = ""
  EnableEstimatorTLS = false

  [P2P]
  ListenAddresses = [
    "/ip4/0.0.0.0/udp/2121/quic-v1/webtransport",
    "/ip6/::/udp/2121/quic-v1/webtransport",
    "/ip4/0.0.0.0/udp/2121/quic-v1",
    "/ip6/::/udp/2121/quic-v1",
    "/ip4/0.0.0.0/udp/2121/webrtc-direct",
    "/ip6/::/udp/2121/webrtc-direct",
    "/ip4/0.0.0.0/tcp/2121",
    "/ip6/::/tcp/2121"
  ]
  AnnounceAddresses = []
  NoAnnounceAddresses = [
    "/ip4/127.0.0.1/udp/2121/quic-v1/webtransport",
    "/ip4/0.0.0.0/udp/2121/quic-v1/webtransport",
    "/ip6/::/udp/2121/quic-v1/webtransport",
    "/ip4/0.0.0.0/udp/2121/quic-v1",
    "/ip4/127.0.0.1/udp/2121/quic-v1",
    "/ip6/::/udp/2121/quic-v1",
    "/ip4/0.0.0.0/udp/2121/webrtc-direct",
    "/ip4/127.0.0.1/udp/2121/webrtc-direct",
    "/ip6/::/udp/2121/webrtc-direct",
    "/ip4/0.0.0.0/tcp/2121",
    "/ip4/127.0.0.1/tcp/2121",
    "/ip6/::/tcp/2121"
  ]
  MutualPeers = []
  PeerExchange = false

  [P2P.ConnManager]
  Low = 50
  High = 100
  GracePeriod = "1m0s"

  [RPC]
  Address = "0.0.0.0"
  Port = "26658"
  SkipAuth = true

  [RPC.CORS]
  Enabled = false
  AllowedOrigins = []
  AllowedHeaders = []
  AllowedMethods = []

  [Share]
  BlockStoreCacheSize = 128
  UseShareExchange = true
  UseBitswap = true

  [Share.EDSStoreParams]
  RecentBlocksCacheSize = 10

  [Share.ShrexClient]
  ReadTimeout = "2m0s"
  WriteTimeout = "5s"

  [Share.ShrexServer]
  ReadTimeout = "5s"
  WriteTimeout = "1m0s"
  HandleRequestTimeout = "1m0s"
  ConcurrencyLimit = 10

  [Share.PeerManagerParams]
  PoolValidationTimeout = "2m0s"
  PeerCooldown = "3s"
  GcInterval = "30s"
  EnableBlackListing = false

  [Share.LightAvailability]
  SampleAmount = 16

  [Share.Discovery]
  PeersLimit = 5
  AdvertiseInterval = "1h0m0s"

  [Header]
  TrustedPeers = []

  [Header.Store]
  StoreCacheSize = 512
  IndexCacheSize = 2048
  WriteBatchSize = 16

  [Header.Syncer]
  PruningWindow = "169h0m0s"
  # Set to a trusted hash to start syncing from a specific point. Leave empty to sync from genesis.
  SyncFromHash = ""
  # Set to a trusted height to start syncing from. Use 0 to disable.
  SyncFromHeight = 0

  [Header.Server]
  WriteDeadline = "8s"
  ReadDeadline = "1m0s"
  RequestTimeout = "10s"

  [Header.Client]
  MaxHeadersPerRangeRequest = 64
  RequestTimeout = "8s"

  [DASer]
  SamplingRange = 100
  ConcurrencyLimit = 16
  BackgroundStoreInterval = "10m0s"
  SampleTimeout = "1m36s"
  Enabled = true

network: "mocha"
node_type: "light"
core:
  rpc_url: rpc-mocha.pops.one
  grpc_port: 9090

# Optional: Your wallet's mnemonic phrase for key restoration
# If not provided, a random key will be generated on first startup and persisted
# use --set mnemonic="<your mnemonic here>" to set the mnemonic via helm install
mnemonic: ""

share:
  useExchange: true
  # Number of peers to sample for data availability sampling
  sampleSize: 8
  # Minimum number of successful responses required
  minSamples: 2
  # Concurrency limit for data availability sampling
  concurrencyLimit: 8

header:
  trustedPeers: []
  trustedHeight: 7410000
  syncFromHash: "3A23865AE9BDB52D775259431B114552F02DECBB0C56D799FDFB6DFB21534285"

daser:
  enabled: true
  samplingRange: 128

pruner:
  enableService: false

storage:
  size: "220Gi"
  retainPvcOnUninstall: true

service:
  type: "ClusterIP"
  ports:
    p2p-tcp:
      enabled: true
      port: 2121
      targetPort: 2121
      protocol: TCP
    p2p-udp:
      enabled: true
      port: 2121
      targetPort: 2121
      protocol: UDP
    rpc:
      enabled: true
      port: 26658
      targetPort: 26658
      protocol: TCP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: ""
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - secretName: "celestia-tls"
      hosts:
        - ""

resources:
  requests:
    cpu: "1000m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

rpc:
  auth:
    skipAuth: true

# External Secrets configuration for managing sensitive data
externalSecrets:
  celestia-node-secret-env:
    provider: aws
    refreshInterval: 2m
    serviceAccount: external-secrets
    data:
      - remoteRef:
          key: scroll/celestia-node-secret-env
          property: mnemonic
        secretKey: mnemonic
      - remoteRef:
          key: scroll/celestia-node-secret-env
          property: x-token
        secretKey: x-token

# Celestia Node configuration for Devnet environment
# These values override the defaults in charts/scroll-sdk/values.yaml
#cat OAZHALLLMV4Q
scroll-common:
  enabled: true

celestia-node:
  core:
    # Connect to the validator service created by this release
    rpc_url: "{{ .Release.Name }}-validator"
  header:
    trustedPeers:
      - "/dns4/{{ .Release.Name }}-bridge/tcp/2121/p2p/12D3KooWG512SeSicaQEa8dWR89JZ8eimUAW6z4LoBDH5PkJzYeE"
    syncFromHash: ""
  persistence:
    data:
      retain: false
  configToml: |
    [Node]
    StartupTimeout = "10m"
    ShutdownTimeout = "20s"

    [Core]
    IP = ""
    Port = "9090"
    TLSEnabled = false
    XTokenPath = ""
    AdditionalCoreEndpoints = []

    [State]
    DefaultKeyName = "my_celes_key"
    DefaultBackendName = "test"
    EstimatorAddress = ""
    EnableEstimatorTLS = false

    [P2P]
    ListenAddresses = [
      "/ip4/0.0.0.0/udp/2121/quic-v1/webtransport",
      "/ip6/::/udp/2121/quic-v1/webtransport",
      "/ip4/0.0.0.0/udp/2121/quic-v1",
      "/ip6/::/udp/2121/quic-v1",
      "/ip4/0.0.0.0/udp/2121/webrtc-direct",
      "/ip6/::/udp/2121/webrtc-direct",
      "/ip4/0.0.0.0/tcp/2121",
      "/ip6/::/tcp/2121"
    ]
    AnnounceAddresses = []
    NoAnnounceAddresses = [
      "/ip4/127.0.0.1/udp/2121/quic-v1/webtransport",
      "/ip4/0.0.0.0/udp/2121/quic-v1/webtransport",
      "/ip6/::/udp/2121/quic-v1/webtransport",
      "/ip4/0.0.0.0/udp/2121/quic-v1",
      "/ip4/127.0.0.1/udp/2121/quic-v1",
      "/ip6/::/udp/2121/quic-v1",
      "/ip4/0.0.0.0/udp/2121/webrtc-direct",
      "/ip4/127.0.0.1/udp/2121/webrtc-direct",
      "/ip6/::/udp/2121/webrtc-direct",
      "/ip4/0.0.0.0/tcp/2121",
      "/ip4/127.0.0.1/tcp/2121",
      "/ip6/::/tcp/2121"
    ]
    MutualPeers = []
    PeerExchange = false

    [P2P.ConnManager]
    Low = 50
    High = 100
    GracePeriod = "1m0s"

    [RPC]
    Address = "0.0.0.0"
    Port = "26658"
    SkipAuth = true

    [RPC.CORS]
    Enabled = false
    AllowedOrigins = []
    AllowedHeaders = []
    AllowedMethods = []

    [Share]
    BlockStoreCacheSize = 128
    UseShareExchange = true
    UseBitswap = true

    [Share.EDSStoreParams]
    RecentBlocksCacheSize = 10

    [Share.ShrexClient]
    ReadTimeout = "2m0s"
    WriteTimeout = "5s"

    [Share.ShrexServer]
    ReadTimeout = "5s"
    WriteTimeout = "1m0s"
    HandleRequestTimeout = "1m0s"
    ConcurrencyLimit = 10

    [Share.PeerManagerParams]
    PoolValidationTimeout = "2m0s"
    PeerCooldown = "3s"
    GcInterval = "30s"
    EnableBlackListing = false

    [Share.LightAvailability]
    SampleAmount = 16

    [Share.Discovery]
    PeersLimit = 5
    AdvertiseInterval = "1h0m0s"

    [Header]
    TrustedPeers = ["/dns4/scroll-sdk-devnet-bridge/tcp/2121/p2p/12D3KooWG512SeSicaQEa8dWR89JZ8eimUAW6z4LoBDH5PkJzYeE"]

    [Header.Store]
    StoreCacheSize = 512
    IndexCacheSize = 2048
    WriteBatchSize = 16

    [Header.Syncer]
    PruningWindow = "169h0m0s"
    # Set to a trusted hash to start syncing from a specific point. Leave empty to sync from genesis.
    SyncFromHash = ""
    # Set to a trusted height to start syncing from. Use 0 to disable.
    SyncFromHeight = 0

    [Header.Server]
    WriteDeadline = "8s"
    ReadDeadline = "1m0s"
    RequestTimeout = "10s"

    [Header.Client]
    MaxHeadersPerRangeRequest = 64
    RequestTimeout = "8s"

    [DASer]
    SamplingRange = 100
    ConcurrencyLimit = 16
    BackgroundStoreInterval = "10m0s"
    SampleTimeout = "1m36s"
    Enabled = true
  
l1-devnet:
  enabled: false

l1-interface:
  enabled: true

  env:
    - name: "RUST_LOG"
      value: "info,l1_interface=info"
  configMaps:
    env:
      enabled: true
      data:
        DOGEOS_L1_INTERFACE_NETWORK_STR: "testnet" # testnet, mainnet
        DOGEOS_L1_INTERFACE_SCROLL_MESSENGER_ADDRESS: "" # L1_SCROLL_MESSENGER_PROXY_ADDR
        DOGEOS_L1_INTERFACE_L1_GENESIS_BLOCK: "37023215" # DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
        DOGEOS_L1_INTERFACE_L2_MOAT_CONTRACT_ADDRESS: "0xd48afF55fd2808F2BE4B67faA213596b499b7953" # L2_MOAT_PROXY_ADDR
        DOGEOS_L1_INTERFACE_L2_MESSENGER_ADDRESS: "0xa42C93535E7c2b86bA0F6bf8bD469f5888d2b165" # L2_DOGEOS_MESSENGER_PROXY_ADDR
        DOGEOS_L1_INTERFACE_DEPOSIT_GAS_LIMIT: "500000" # predefined
        DOGEOS_L1_INTERFACE_L1_GAS_LIMIT: "30000000" # predefined
        DOGEOS_L1_INTERFACE_L1_BASE_FEE_PER_GAS: "1000000000" # genesis.BASE_FEE_PER_GAS
        DOGEOS_L1_INTERFACE_L1_MINER_ADDRESS: "0x0000000000000000000000000000000000000001" # predefined
        DOGEOS_L1_INTERFACE_L1_EXTRA_DATA: "DogeOS Local Test" # predefined
        DOGEOS_L1_INTERFACE_INITIAL_SYSTEM_SIGNER: "0x756EA06BDEe36de11F22DCca45a31d8a178eF3c6" # sequencer.L2GETH_SIGNER_ADDRESS
        DOGEOS_L1_INTERFACE_WITHDRAWAL_QUERY_LIMIT: "100" # predefined
        DOGEOS_L1_INTERFACE_MAX_WITHDRAWAL_QUERY_LIMIT: "1000" # predefined
        DOGEOS_L1_INTERFACE_RUN_MIGRATIONS: "true" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_RPC__URL: "http://172.18.0.1:44555" # DOGEOS_WITHDRAWAL_DOGECOIN_RPC_URL
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__CONFIRMATIONS: "6"                # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__START_HEIGHT: "37023215" # DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__POLL_INTERVAL_MS: "10000" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__BRIDGE_ADDRESS: "2NBpDHTKupzphYZ2RVVzr7H2NZpfuebzxGp" # DOGEOS_WITHDRAWAL_BRIDGE_ADDRESS
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__NAMESPACE_ID: "78c5000f7f844cb5" # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__DA_NAMESPACE
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__START_BLOCK: "1" # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__START_BLOCK
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__CONFIRMATIONS: "3"  # predefined
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__POLL_INTERVAL_MS: "15000" # predefined
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__BLOB_GET_ALL_FALLBACK_URL: ""
        DOGEOS_L1_INTERFACE_BLOB_RETENTION: "1000"
        DOGEOS_L1_INTERFACE_BLOB_PRUNING_INTERVAL_SECS: "3600"
        DOGEOS_L1_INTERFACE_REPAIR_CODEC_VERSIONS: "true"
        DOGEOS_L1_INTERFACE_DOGECOIN_RPC__PASS: "shadowfork_testnet_password"
        DOGEOS_L1_INTERFACE_DOGECOIN_RPC__USER: "shadowfork"

  envFrom:
    - configMapRef:
        name: "l1-interface-env"
  persistence:
    data:
      retain: false

  probes:
    liveness:
      enabled: false
      custom: true
      spec:
        httpGet:
          path: "/api/v1/health/live"
          port: http
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
    readiness:
      enabled: false
      custom: true
      spec:
        httpGet:
          path: "/health"
          port: http
        periodSeconds: 10
        timeoutSeconds: 2
        failureThreshold: 3
    startup:
      enabled: false
      custom: true
      spec:
        httpGet:
          path: "/api/v1/health/live"
          port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 60


l2-rpc:
  persistence:
    data:
      retain: false

l2-sequencer:
  persistence:
    data:
      retain: false
celestia-devnet:
  fullnameOverride: devnet-validator
  bridge:
    p2pKey: "CAESQBxTEeqgjwMCzu2AS9TExwaVhZ0TbmhMd8dxeaVNzffnXOXtVUSrniuN5waPkX0S9iRXbTIye67CAY+4u0DO9iM="
    jwtSecret: "w8RkAK94msNs5BQbd+9YxO15E7VusVRL1b3m6zHvO/c="
    peerId: ""
  persistence:
    data:
      retain: false

da-publisher:
  configMaps:
    env:
      enabled: true
      data:
        DOGEOS_DA_PUBLISHER_CELESTIA_RPC_URL: "scroll-sdk-devnet-celestia-node-private:26658"
        DOGEOS_DA_PUBLISHER_CELESTIA_NAMESPACE: "78c5000f7f844cb5"
        DOGEOS_DA_PUBLISHER_DOGEOS_L2_RPC_URL: "http://l2-rpc:8545"
        DOGEOS_DA_PUBLISHER_ENABLE_WITHDRAWAL_ROOT_FETCHING: "true"

contracts:
  image:
    repository: dogeos69/scroll-stack-contracts
    tag: deploy-eb2fd988a5cf90ac39d4c02f67e2b80ca99c7f3f

rollup-relayer:
  image:
    tag: v4.5.47
  enabled: true
  serviceMonitor:
    main:
      enabled: false

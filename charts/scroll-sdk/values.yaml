  fullnameOverride: postgresql
  auth:
    enablePostgresUser: true
    postgresPassword: "qwerty12345"
  volumePermissions:
    enabled: false
  image:
    tag: "latest"
  primary:
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenDeleted: Delete
      whenScaled: Delete
    livenessProbe:
      enabled: false
    readinessProbe:
      enabled: false
    startupProbe:
      enabled: false
    resources:
      exclude-init-chmod-data:
        limits:
          memory: 512Mi
        requests:
          cpu: 250m
          memory: 64Mi
      limits:
        memory: 1024Mi
    extendedConfiguration: |
      max_connections = 400
  tls:
    enabled: false
    autoGenerated: true




l1-interface:
  enabled: true
  image:
    tag: "0.2.0-rc.7"
  configMaps:
    env:
      enabled: true
      data:
        DOGEOS_L1_INTERFACE_NETWORK_STR: "testnet"
        DOGEOS_L1_INTERFACE_SCROLL_MESSENGER_ADDRESS: "" # L1_SCROLL_MESSENGER_PROXY_ADDR
        DOGEOS_L1_INTERFACE_L1_GENESIS_BLOCK: "1" # DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
        DOGEOS_L1_INTERFACE_L2_MOAT_CONTRACT_ADDRESS: "" # L2_MOAT_PROXY_ADDR
        DOGEOS_L1_INTERFACE_L2_MESSENGER_ADDRESS: "" # L2_DOGEOS_MESSENGER_PROXY_ADDR
        DOGEOS_L1_INTERFACE_DEPOSIT_GAS_LIMIT: "500000" # predefined
        DOGEOS_L1_INTERFACE_L1_GAS_LIMIT: "30000000" # predefined
        DOGEOS_L1_INTERFACE_L1_BASE_FEE_PER_GAS: "1000000000" # genesis.BASE_FEE_PER_GAS
        DOGEOS_L1_INTERFACE_L1_MINER_ADDRESS: "0x0000000000000000000000000000000000000001" # predefined
        DOGEOS_L1_INTERFACE_L1_EXTRA_DATA: "DogeOS Local Test" # predefined
        DOGEOS_L1_INTERFACE_INITIAL_SYSTEM_SIGNER: "" # sequencer.L2GETH_SIGNER_ADDRESS
        DOGEOS_L1_INTERFACE_WITHDRAWAL_QUERY_LIMIT: "100" # predefined
        DOGEOS_L1_INTERFACE_MAX_WITHDRAWAL_QUERY_LIMIT: "1000" # predefined
        DOGEOS_L1_INTERFACE_RUN_MIGRATIONS: "true" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_RPC__URL: "" # DOGEOS_WITHDRAWAL_DOGECOIN_RPC_URL
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__CONFIRMATIONS: "6"                # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__START_HEIGHT: "30000000" # DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__INDEX_UTXOS: "false" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__INDEX_WITHDRAWALS: "true" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__INDEX_DEPOSITS: "true" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__POLL_INTERVAL_MS: "10000" # predefined
        DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__BRIDGE_ADDRESS: "" # DOGEOS_WITHDRAWAL_BRIDGE_ADDRESS
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__DA_RPC_URL: "http://{{ .Release.Name }}-celestia-node:26658" # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__DA_RPC_URL
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__NAMESPACE_ID: "0123456789abcdef" # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__DA_NAMESPACE
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__START_BLOCK: "1" # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__START_BLOCK
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__CONFIRMATIONS: "3"  # predefined
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__POLL_INTERVAL_MS: "15000" # predefined
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__STORE_RAW_BLOB_DATA: "true" # predefined
        DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__BLOB_GET_ALL_FALLBACK_URL: ""
        DOGEOS_L1_INTERFACE_BLOB_RETENTION: "1000"
        DOGEOS_L1_INTERFACE_BLOB_PRUNING_INTERVAL_SECS: "3600"
        DOGEOS_L1_INTERFACE_REPAIR_CODEC_VERSIONS: "true"
        DOGEOS_L1_INTERFACE_DOGECOIN_RPC__PASS: ""
        DOGEOS_L1_INTERFACE_DOGECOIN_RPC__USER: ""



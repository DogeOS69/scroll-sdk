# Celestia local devnet (includes validator + bridge node)
celestia-devnet:
  enabled: true

# Celestia light node - connects to celestia-devnet by default for local testing
celestia-node:
  enabled: true
  image:
    tag: "v0.28.5-mocha"
  # Network configuration - use "private" for devnet, "mocha" for testnet
  network: "private"
  node_type: "light"
  # Connect to local celestia-devnet bridge
  # For production, use external RPC like "rpc-mocha.pops.one"
  core:
    rpc_url: "celestia-devnet-validator"
    grpc_port: 9090
    # Disable TLS for local devnet connection
    tls: false
  # Fixed mnemonic for devnet - matches the devnet bridge mnemonic
  mnemonic: "abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon blade"
  # Configuration for private network headers
  header:
    trustedPeers:
      - "/dns4/celestia-devnet-bridge/tcp/2121/p2p/"
    syncFromHash: ""
  storage:
    size: "10Gi"
  ingress:
    enabled: false
  rpc:
    auth:
      skipAuth: true
  # Disable metrics for devnet (no grafana-alloy available)
  metrics:
    enabled: false

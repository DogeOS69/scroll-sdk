global:
  nameOverride: &app_name metrics-exporter
  fullnameOverride: *app_name

controller:
  replicas: 1

args:
  - "-config=/config/config.yml"


image:
  repository: ghcr.io/unifralabs/metrics-exporter
  pullPolicy: IfNotPresent
  tag: v0.1.2


service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: &service_port 8801
        targetPort: *service_port

persistence:
  metrics-exporter:
    enabled: true
    type: configMap
    mountPath: /config/
    name: metrics-exporter-config


# Monitoring configuration
serviceMonitor:
  main:
    enabled: true
    labels:
      release: scroll-sdk
    serviceName: '{{ include "scroll.common.lib.chart.names.fullname" $ }}'
    endpoints:
      - port: http
        interval: 30s
        scrapeTimeout: 10s


metricsConfig:
  app:
    logLevel: info
    job: *app_name
    workers: 5
    maxBodySize: 512
    metrics: /metrics
    port: *service_port
  l1Network:
    name: anvil
    prefix: anvil
    url:
    L1_MESSAGE_QUEUE_PROXY_ADDR:
  dogecoin:
    url:
    basicAuth:
    prefix: dogecoin_testnet

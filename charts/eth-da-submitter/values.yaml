global:
  nameOverride: &app_name eth-da-submitter
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/eth-da-submitter
  pullPolicy: Always
  tag: latest

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3004
        protocol: TCP

defaultProbes: &default_probes
  enabled: true
  custom: true
  spec:
    httpGet:
      path: "/health"
      port: http

probes:
  liveness:
    <<: *default_probes
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/ready"
        port: http
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/ready"
        port: http
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 24
      timeoutSeconds: 2

# Application env/config is intentionally supplied by deployment values such as
# examples/values/eth-da-submitter-production.yaml.

persistence:
  data:
    enabled: true
    name: eth-da-submitter-data-pvc
    type: pvc
    mountPath: /app/data
    accessMode: ReadWriteOnce
    size: 1Gi
    retain: true

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

serviceMonitor:
  main:
    enabled: true

ingress:
  main:
    enabled: false

externalSecrets: {}

    role: "Correctness"
  - network: "testnet"
    uri: "https://hjyjdjvxyw.us-west-2.awsapprunner.com" # Or 127.0.0.1:4001 if signers are on the localhost
    role: "Correctness"
  - network: "testnet"
    uri: "https://3mqhpxstvh.us-west-2.awsapprunner.com" # Or 127.0.0.1:4001 if signers are on the localhost

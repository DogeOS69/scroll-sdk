# Persistence Configuration
persistence:
  data:
    enabled: true
    name: withdrawal-processor-data-pvc # Ensure this aligns with your PVC naming strategy
    size: 1000Gi
    retain: true
    # storageClass: "your-production-storage-class" # FIXME: Uncomment and set if you use a specific storage class for production

# Resource configuration for production
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1500m"

serviceMonitor:
  main:
    enabled: true # Enable if you have Prometheus monitoring in production

defaultProbes:
  enabled: false

# Note on TSO Signers:
# The [[tso_signers]] array of tables from WithdrawalProcessor.toml
# cannot be easily configured via Helm environment variables due to Figment limitations.
# For local testing, ensure your local WithdrawalProcessor.toml (if used directly by the application)
# or the TOML file mounted as a ConfigMap (if testing full K8s deployment)
# has the correct TSO signer configurations for 'testnet', e.g.:
# [[tso_signers]]
# network = "testnet"
# uri = "http://127.0.0.1:4001" # or http://cubesigner-signer-1:3000 if in K8s
# role = "Correctness"
#
# [[tso_signers]]
# network = "testnet"
# uri = "http://127.0.0.1:4002" # or http://cubesigner-signer-2:3000 if in K8s
# role = "Attestation"

# As noted in values.yaml, [[tso_signers]] must be configured via the TOML file.
# Ensure your production WithdrawalProcessor.toml (mounted as a configmap)
# has the correct mainnet TSO signer configurations.
# Example:
# [[tso_signers]]
# network = "mainnet"
# uri = "http://mainnet-cubesigner-signer-1:3000" # Adjust URI for your prod signer
# role = "Correctness"
#
# [[tso_signers]]
# network = "mainnet"
# uri = "http://mainnet-cubesigner-signer-2:3000" # Adjust URI for your prod signer
# role = "Attestation"
#
# Note on Database: A 1Gi Persistent Volume Claim (data) is configured and enabled above.
# However, the DOGEOS_WITHDRAWAL_DATABASE_URL in this production file is currently set for PostgreSQL.
# If you intend to use SQLite with this PVC in production, update the
# DOGEOS_WITHDRAWAL_DATABASE_URL to 'sqlite:///app/data/withdrawal_processor.db'.

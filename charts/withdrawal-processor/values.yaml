global:
  nameOverride: &app_name withdrawal-processor
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/withdrawal-processor
  pullPolicy: Always
  tag: 110325-00

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000
    annotations: {placeholder: "annotation"}

probes:
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 2

  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 2

  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/ready
        port: http
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2


persistence:
  data:
    enabled: true
    name: withdrawal-processor-data-pvc
    type: pvc
    mountPath: /app/data
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {placeholder: "annotation"}
    retain: true

# Resource configuration
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Monitoring configuration
serviceMonitor:
  main:
    enabled: false

# Application env/config is intentionally supplied by deployment values such as
# examples/values/withdrawal-processor-production.yaml.

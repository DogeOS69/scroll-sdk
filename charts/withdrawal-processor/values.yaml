global:
  nameOverride: &app_name withdrawal-processor
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/withdrawal-processor
  pullPolicy: Always
  tag: 110325-00

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000
    annotations: {placeholder: "annotation"}

probes:
  startupProbe:
    httpGet:
      path: /healthz/live
      port: http
    periodSeconds: 10
    failureThreshold: 60
    timeoutSeconds: 2

  livenessProbe:
    httpGet:
      path: /healthz/live
      port: http
    periodSeconds: 15
    failureThreshold: 3
    timeoutSeconds: 2

  readinessProbe:
    enabled: true
    httpGet:
      path: /healthz/ready
      port: http
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 2


# Direct environment variables for CubeSigner Signer configuration
env:
  # Top-level settings from WithdrawalProcessor.toml
  - name: DOGEOS_WITHDRAWAL_NETWORK_STR
    value: "testnet"
  - name: DOGEOS_WITHDRAWAL_DATABASE_URL
    value: "sqlite:///app/data/withdrawal_processor.db"
  - name: DOGEOS_WITHDRAWAL_API_PORT
    value: "3000"
  - name: DOGEOS_WITHDRAWAL_DOGECOIN_RPC_URL
    value: "https://testnet.doge.xyz"
  # - name: DOGEOS_WITHDRAWAL_DOGECOIN_RPC_USER
  #   value: ""    # Sensitive: Override in production, preferably via secrets
  # - name: DOGEOS_WITHDRAWAL_DOGECOIN_RPC_PASS
  #   value: ""    # Sensitive: Override in production, preferably via secrets
  - name: DOGEOS_WITHDRAWAL_TSO_URL
    value: "http://127.0.0.1:3001"    # This should point to the tso-service
  - name: DOGEOS_WITHDRAWAL_BRIDGE_ADDRESS
    value: "2NFNonsBJC8ba8z9Xg7uZFboJ5mTrTzZMFQ"
  - name: DOGEOS_WITHDRAWAL_BRIDGE_SCRIPT_HEX
    value: ""
  # - name: DOGEOS_WITHDRAWAL_FEE_SIGNER_KEY
  #   value: ""    # Sensitive: Override in production, preferably via secrets
  # - name: DOGEOS_WITHDRAWAL_SEQUENCER_SIGNER_KEY
  #   value: ""    # Sensitive: Override in production, preferably via secrets
  - name: DOGEOS_WITHDRAWAL_MAX_WITHDRAWAL_OUTPUTS_PER_TX
    value: "85"
  - name: DOGEOS_WITHDRAWAL_FEE_RATE_SAT_PER_KVB
    value: "1000000"
  - name: DOGEOS_WITHDRAWAL_COORDINATOR_POLL_INTERVAL_SECS

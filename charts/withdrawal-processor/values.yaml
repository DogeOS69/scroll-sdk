global:
  nameOverride: &app_name withdrawal-processor
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/withdrawal-processor
  pullPolicy: Always
  tag: 110325-00

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000
    annotations: {placeholder: "annotation"}

probes:
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 2

  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 2

  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/ready
        port: http
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2


persistence:
  data:
    enabled: true
    name: withdrawal-processor-data-pvc
    type: pvc
    mountPath: /app/data
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {placeholder: "annotation"}
    retain: true

  protocol-context:
    enabled: true
    type: configMap
    name: protocol-context-config
    mountPath: /app/protocol_context.json
    subPath: protocol_context.json
    readOnly: true

  # Configuration for mounting the TSO signers ConfigMap
  tso-signers-config:
    enabled: true
    type: configMap
    name: "{{ include \"withdrawal-processor.fullname\" . }}-tso-signers"
    mountPath: /app/config/signers.toml
    subPath: signers.toml
    readOnly: true

ethereumDa:
  indexer:
    enabled: false
    # eth-da-indexer runs as a sidecar in the same pod as withdrawal-processor,
    # but uses its own image. The tag defaults to image.tag when omitted so the
    # two services can still be rolled out as a matched release.
    image:
      repository: dogeos69/eth-da-indexer
      tag: ""
      pullPolicy: ""
    command:
      - /usr/local/bin/eth_da_indexer
    args:
      - --config
      - /app/config/eth-da-indexer.toml
    listenPort: 3001
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    config:
      service:
        listenAddress: "0.0.0.0"
        listenPort: 3001
        shutdownGracePeriodSec: 30
      ethereum:
        rpcUrl: ""
        ethChainId: null
      indexer:
        l2ChainId: null
        sqlitePath: /app/data/eth-da-indexer.sqlite
        cursorId: eth_da_inbox
        startBlock: 0
        ingestDepth: 1
        safeDepth: 32
        finalizedDepth: 64
        rollbackLookback: 128
        pollIntervalMs: 6000
        maxBlocksPerCycle: 64
        expectedBatchers: []
      artifacts:
        enabled: false
        artifactStoreRoot: /app/data/eth-da-blob-artifacts
        artifactMetadataSqlitePath: /app/data/eth-da-artifact-metadata.sqlite
        compression: none
        pollIntervalMs: 6000
        maxPublicationsPerCycle: 256
        maxArtifactsPerCycle: 32
        minFinality: pending
      blobSources:
        beacon:
          enabled: false
          endpoint: ""
          timeoutMs: 10000
        blobscan:
          enabled: false
          endpoint: ""
          timeoutMs: 10000
        blocknative:
          enabled: false
          endpoint: ""
          timeoutMs: 10000
        s3:
          enabled: false
          endpoint: ""
          timeoutMs: 10000
          treatForbiddenAsMissing: false

# Resource configuration
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Monitoring configuration
serviceMonitor:
  main:
    enabled: false

# tsoSigners configures the TSO signers. This will be rendered into a ConfigMap
# and mounted into the pod as /app/config/signers.toml
# Example:
# tsoSigners:
#   - network: "testnet"
#     uri: "http://your-correctness-signer-service.namespace.svc.cluster.local:3000"
#     role: "Correctness"
#   - network: "testnet"
#     uri: "http://your-attestation-signer-service.namespace.svc.cluster.local:3000"
#     role: "Attestation"
tsoSigners: []
# - network: "testnet"
#   uri: "http://127.0.0.1:4001" # Example for local, replace with K8s service names for actual deployment
#   role: "Correctness"
# - network: "testnet"
#   uri: "http://127.0.0.1:4002"
#   role: "Attestation"

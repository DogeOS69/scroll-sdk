global:
  nameOverride: &app_name withdrawal-processor
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/withdrawal-processor
  pullPolicy: Always
  tag: 110325-00

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000
    annotations: {placeholder: "annotation"}

probes:
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 2

  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 2

  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/ready
        port: http
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2


# Direct environment variables for CubeSigner Signer configuration
env:
  - name: DOGEOS_WITHDRAWAL_PROTOCOL_CONTEXT_JSON # 可选路径；与 replay_sqlite_path 同生灭；启用 protocol-lane 模式时强制要求 fetch_and_decode_blobs=true 且 discovery_mode≠fulfillment_driven
    value: "/app/protocol_context.json"
  - name: DOGEOS_WITHDRAWAL_DATABASE_URL
    value: "sqlite:///app/data/withdrawal_processor.db"
  - name: DOGEOS_WITHDRAWAL_API_PORT
    value: "3000"
  - name: DOGEOS_WITHDRAWAL_MAX_WITHDRAWAL_OUTPUTS_PER_TX
    value: "85"
  - name: DOGEOS_WITHDRAWAL_FEE_RATE_SAT_PER_KVB
    value: "1000000"
  - name: DOGEOS_WITHDRAWAL_COORDINATOR_POLL_INTERVAL_SECS
    value: "10"
  - name: DOGEOS_WITHDRAWAL_DEBUG_SKIP_BROADCAST
    value: "false"

  # Dogecoin Indexer
  - name: DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
    value: "4000000"
  - name: DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__CONFIRMATIONS
    value: "1"
  - name: DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__POLL_INTERVAL_MS
    value: "10000"

  # DogeOS Indexer
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__RPC_URL
    value: "https://sepolia-rpc.scroll.io/"
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__START_BLOCK
    value: "9416118"
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__CONFIRMATIONS
    value: "10"
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__POLL_INTERVAL_MS
    value: "5000"
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__MESSENGER_ADDRESS
    value: "0xBa50f5340FB9F3Bd074bD638c9BE13eCB36E603d"
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__MESSAGE_QUEUE_ADDRESS
    value: "0x5300000000000000000000000000000000000000"
  - name: DOGEOS_WITHDRAWAL_DOGEOS_INDEXER__LOG_QUERY_BATCH_SIZE
    value: "10000"

  # Celestia Indexer
  - name: DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__CONFIRMATIONS
    value: "3"
  - name: DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__POLL_INTERVAL_MS
    value: "15000"
  - name: DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__FETCH_AND_DECODE_BLOBS
    value: "true"
  - name: DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__BLOB_GET_ALL_FALLBACK_URL
    value: ""

  # UTXO Manager
  - name: DOGEOS_WITHDRAWAL_UTXO_MANAGER__HIGH_THRESH_SATS
    value: "1000000000"
  - name: DOGEOS_WITHDRAWAL_UTXO_MANAGER__BRIDGE_MIN_CONFIRMATIONS
    value: "10"
  - name: DOGEOS_WITHDRAWAL_REPLAY_SQLITE_PATH # 可选路径；rotate_key_v2/advance_l1_builder_v2/advance_l2_builder_v2/l2_bootstrap_next_starting_block_height 任一启用时必填且文件须存在
    value: "/app/data/replay.sqlite"

  # Fulfillment Processor (defaults are usually fine, typically not set via env vars unless overriding specific fields)
  # - name: DOGEOS_WITHDRAWAL_FULFILLMENT_PROCESSOR__MAX_RETRIES
  #   value: "3"
  # - name: DOGEOS_FULFILLMENT_PROCESSOR__RETRY_DELAY_MS
  #   value: "5000"
  # - name: DOGEOS_WITHDRAWAL_FULFILLMENT_PROCESSOR__TSO_CHECK_DELAY_MS
  #   value: "10000"

  # Note: The [[tso_signers]] array of tables from WithdrawalProcessor.toml
  # cannot be configured via environment variables due to Figment limitations.
  # This section must be configured via the TOML config file,
  # which can be mounted as a configmap in Kubernetes.

persistence:
  data:
    enabled: false
    name: withdrawal-processor-data-pvc
    type: pvc
    mountPath: /app/data
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {placeholder: "annotation"}
    retain: true

  # Configuration for mounting the TSO signers ConfigMap
  tso-signers-config:
    enabled: true
    type: configMap
    name: "{{ include \"withdrawal-processor.fullname\" . }}-tso-signers"
    mountPath: /app/config/signers.toml
    subPath: signers.toml
    readOnly: true

# Resource configuration
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Monitoring configuration
serviceMonitor:
  main:
    enabled: false

# tsoSigners configures the TSO signers. This will be rendered into a ConfigMap
# and mounted into the pod as /app/config/signers.toml
# Example:
# tsoSigners:
#   - network: "testnet"
#     uri: "http://your-correctness-signer-service.namespace.svc.cluster.local:3000"
#     role: "Correctness"
#   - network: "testnet"
#     uri: "http://your-attestation-signer-service.namespace.svc.cluster.local:3000"
#     role: "Attestation"
tsoSigners: []
# - network: "testnet"
#   uri: "http://127.0.0.1:4001" # Example for local, replace with K8s service names for actual deployment
#   role: "Correctness"
# - network: "testnet"
#   uri: "http://127.0.0.1:4002"
#   role: "Attestation"

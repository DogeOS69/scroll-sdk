global:
  nameOverride: &app_name withdrawal-processor
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/withdrawal-processor
  pullPolicy: Always
  tag: 110325-00

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000
    annotations: {placeholder: "annotation"}

probes:
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 2

  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/live
        port: http
      periodSeconds: 15
      failureThreshold: 3
      timeoutSeconds: 2

  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: /healthz/ready
        port: http
      periodSeconds: 10
      failureThreshold: 3
      timeoutSeconds: 2


persistence:
  data:
    enabled: true
    name: withdrawal-processor-data-pvc
    type: pvc
    mountPath: /app/data
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {placeholder: "annotation"}
    retain: true

  protocol-context:
    enabled: true
    type: configMap
    name: protocol-context-config
    mountPath: /app/protocol_context.json
    subPath: protocol_context.json
    readOnly: true

  # Configuration for mounting the TSO signers ConfigMap
  tso-signers-config:
    enabled: true
    type: configMap
    name: "{{ include \"withdrawal-processor.fullname\" . }}-tso-signers"
    mountPath: /app/config/signers.toml
    subPath: signers.toml
    readOnly: true

# Init container: seed the replay SQLite DB if it does not already exist.
initContainers:
  01-seed-replay-db:
    image: "dogeos69/dogeos-replay:latest"
    imagePullPolicy: "IfNotPresent"
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -e
        SQLITE_DB=/app/data/replay.sqlite
        if [ -f "$SQLITE_DB" ]; then
          echo "replay sqlite already exists at $SQLITE_DB, skipping seed"
          exit 0
        fi
        echo "replay sqlite missing, seeding genesis..."
        replay_runner --seed-genesis \
          --context-json /app/protocol_context.json \
          --sqlite-db /app/data/replay.sqlite \
          --artifact-dir /app/data/replay.artifacts
    volumeMounts:
      - name: data
        mountPath: /app/data
      - name: protocol-context
        mountPath: /app/protocol_context.json
        subPath: protocol_context.json
        readOnly: true

# Resource configuration
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Monitoring configuration
serviceMonitor:
  main:
    enabled: false

# tsoSigners configures the TSO signers. This will be rendered into a ConfigMap
# and mounted into the pod as /app/config/signers.toml
# Example:
# tsoSigners:
#   - network: "testnet"
#     uri: "http://your-correctness-signer-service.namespace.svc.cluster.local:3000"
#     role: "Correctness"
#   - network: "testnet"
#     uri: "http://your-attestation-signer-service.namespace.svc.cluster.local:3000"
#     role: "Attestation"
tsoSigners: []
# - network: "testnet"
#   uri: "http://127.0.0.1:4001" # Example for local, replace with K8s service names for actual deployment
#   role: "Correctness"
# - network: "testnet"
#   uri: "http://127.0.0.1:4002"
#   role: "Attestation"

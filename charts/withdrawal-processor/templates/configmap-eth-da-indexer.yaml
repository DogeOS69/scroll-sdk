{{- $ethDa := default dict .Values.ethereumDa -}}
{{- $indexer := default dict $ethDa.indexer -}}
{{- if $indexer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "withdrawal-processor.ethDaIndexerConfigMapName" . }}
  labels:
    {{- include "withdrawal-processor.labels" . | nindent 4 }}
data:
  eth-da-indexer.toml: |
    [service]
    listen_address = {{ default "0.0.0.0" $indexer.config.service.listenAddress | quote }}
    listen_port = {{ default 3001 $indexer.config.service.listenPort }}
    shutdown_grace_period_sec = {{ default 30 $indexer.config.service.shutdownGracePeriodSec }}

    [ethereum]
    rpc_url = {{ required "ethereumDa.indexer.config.ethereum.rpcUrl is required when ethereumDa.indexer.enabled=true" $indexer.config.ethereum.rpcUrl | quote }}
    eth_chain_id = {{ required "ethereumDa.indexer.config.ethereum.ethChainId is required when ethereumDa.indexer.enabled=true" $indexer.config.ethereum.ethChainId }}

    [indexer]
    l2_chain_id = {{ required "ethereumDa.indexer.config.indexer.l2ChainId is required when ethereumDa.indexer.enabled=true" $indexer.config.indexer.l2ChainId }}
    sqlite_path = {{ default "/app/data/eth-da-indexer.sqlite" $indexer.config.indexer.sqlitePath | quote }}
    cursor_id = {{ default "eth_da_inbox" $indexer.config.indexer.cursorId | quote }}
    start_block = {{ default 0 $indexer.config.indexer.startBlock }}
    ingest_depth = {{ default 1 $indexer.config.indexer.ingestDepth }}
    safe_depth = {{ default 32 $indexer.config.indexer.safeDepth }}
    finalized_depth = {{ default 64 $indexer.config.indexer.finalizedDepth }}
    rollback_lookback = {{ default 128 $indexer.config.indexer.rollbackLookback }}
    poll_interval_ms = {{ default 6000 $indexer.config.indexer.pollIntervalMs }}
    max_blocks_per_cycle = {{ default 64 $indexer.config.indexer.maxBlocksPerCycle }}
    expected_batchers = [
{{- range default (list) $indexer.config.indexer.expectedBatchers }}
      {{ . | quote }},
{{- end }}
    ]

    [artifacts]
    enabled = {{ default false $indexer.config.artifacts.enabled }}
    artifact_store_root = {{ default "/app/data/eth-da-blob-artifacts" $indexer.config.artifacts.artifactStoreRoot | quote }}
    artifact_metadata_sqlite_path = {{ default "/app/data/eth-da-artifact-metadata.sqlite" $indexer.config.artifacts.artifactMetadataSqlitePath | quote }}
    compression = {{ default "none" $indexer.config.artifacts.compression | quote }}
    poll_interval_ms = {{ default 6000 $indexer.config.artifacts.pollIntervalMs }}
    max_publications_per_cycle = {{ default 256 $indexer.config.artifacts.maxPublicationsPerCycle }}
    max_artifacts_per_cycle = {{ default 32 $indexer.config.artifacts.maxArtifactsPerCycle }}
    min_finality = {{ default "pending" $indexer.config.artifacts.minFinality | quote }}

    [blob_sources.beacon]
    enabled = {{ default false $indexer.config.blobSources.beacon.enabled }}
    endpoint = {{- if $indexer.config.blobSources.beacon.enabled }} {{ required "ethereumDa.indexer.config.blobSources.beacon.endpoint is required when beacon blob source is enabled" $indexer.config.blobSources.beacon.endpoint | quote }}{{- else }} ""{{- end }}
    timeout_ms = {{ default 10000 $indexer.config.blobSources.beacon.timeoutMs }}

    [blob_sources.blobscan]
    enabled = {{ default false $indexer.config.blobSources.blobscan.enabled }}
    endpoint = {{- if $indexer.config.blobSources.blobscan.enabled }} {{ required "ethereumDa.indexer.config.blobSources.blobscan.endpoint is required when blobscan blob source is enabled" $indexer.config.blobSources.blobscan.endpoint | quote }}{{- else }} ""{{- end }}
    timeout_ms = {{ default 10000 $indexer.config.blobSources.blobscan.timeoutMs }}

    [blob_sources.blocknative]
    enabled = {{ default false $indexer.config.blobSources.blocknative.enabled }}
    endpoint = {{- if $indexer.config.blobSources.blocknative.enabled }} {{ required "ethereumDa.indexer.config.blobSources.blocknative.endpoint is required when blocknative blob source is enabled" $indexer.config.blobSources.blocknative.endpoint | quote }}{{- else }} ""{{- end }}
    timeout_ms = {{ default 10000 $indexer.config.blobSources.blocknative.timeoutMs }}

    [blob_sources.s3]
    enabled = {{ default false $indexer.config.blobSources.s3.enabled }}
    endpoint = {{- if $indexer.config.blobSources.s3.enabled }} {{ required "ethereumDa.indexer.config.blobSources.s3.endpoint is required when s3 blob source is enabled" $indexer.config.blobSources.s3.endpoint | quote }}{{- else }} ""{{- end }}
    timeout_ms = {{ default 10000 $indexer.config.blobSources.s3.timeoutMs }}
    treat_forbidden_as_missing = {{ default false $indexer.config.blobSources.s3.treatForbiddenAsMissing }}
{{- end }}

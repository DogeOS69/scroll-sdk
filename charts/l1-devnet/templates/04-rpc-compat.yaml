{{- if .Values.service.main.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "l1-devnet.rpcServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "l1-devnet.gethName" . }}
    {{- include "l1-devnet.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.main.type }}
  selector:
    app: {{ include "l1-devnet.gethName" . }}
  ports:
    - name: rpc
      port: 8545
      targetPort: 8545
    - name: ws
      port: 8546
      targetPort: 8546
    - name: authrpc
      port: 8551
      targetPort: 8551
{{- end }}

{{- if .Values.ingress.main.enabled }}
{{- range $host := .Values.ingress.main.hosts }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "l1-devnet.rpcServiceName" $ }}{{ if $host.host }}-{{ $host.host | replace "." "-" | trunc 40 | trimSuffix "-" }}{{ end }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "l1-devnet.labels" $ | nindent 4 }}
    {{- with $.Values.ingress.main.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with $.Values.ingress.main.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with $.Values.ingress.main.ingressClassName }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  rules:
    - {{- if $host.host }}
      host: {{ $host.host | quote }}
      {{- end }}
      http:
        paths:
          {{- range $path := $host.paths }}
          - path: {{ $path.path | quote }}
            pathType: {{ $path.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "l1-devnet.rpcServiceName" $ }}
                port:
                  number: 8545
          {{- end }}
{{- end }}
{{- end }}

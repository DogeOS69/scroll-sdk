---
# Production environment overrides
image:
  repository: "dogeos69/l1-interface"
  pullPolicy: "Always"
  tag: "090825-01"

# Direct environment variables
env:
  - name: "RUST_LOG"
    value: "info"     # info,l1_interface=debug

# ConfigMap overrides for production
configMaps:
  env:
    enabled: true
    data:
      DOGEOS_L1_INTERFACE_NETWORK_STR: "testnet"                              # testnet, mainnet
      DOGEOS_L1_INTERFACE_SCROLL_MESSENGER_ADDRESS: ""                        # L1_SCROLL_MESSENGER_PROXY_ADDR
      DOGEOS_L1_INTERFACE_L1_GENESIS_BLOCK: "8208200"                         # DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
      DOGEOS_L1_INTERFACE_L2_MOAT_CONTRACT_ADDRESS: ""                        # L2_MOAT_PROXY_ADDR
      DOGEOS_L1_INTERFACE_L2_MESSENGER_ADDRESS: ""                            # L2_DOGEOS_MESSENGER_PROXY_ADDR
      DOGEOS_L1_INTERFACE_DEPOSIT_GAS_LIMIT: "500000"                         # predefined
      DOGEOS_L1_INTERFACE_L1_GAS_LIMIT: "30000000"                            # predefined
      DOGEOS_L1_INTERFACE_L1_BASE_FEE_PER_GAS: "1000000000"                   # genesis.BASE_FEE_PER_GAS
      DOGEOS_L1_INTERFACE_L1_MINER_ADDRESS: "0x0000000000000000000000000000000000000001"  # predefined
      DOGEOS_L1_INTERFACE_L1_EXTRA_DATA: "DogeOS Local Test"                  # predefined

      DOGEOS_L1_INTERFACE_INITIAL_SYSTEM_SIGNER: ""                           # sequencer.L2GETH_SIGNER_ADDRESS 
      DOGEOS_L1_INTERFACE_WITHDRAWAL_QUERY_LIMIT: "100"                       # predefined
      DOGEOS_L1_INTERFACE_MAX_WITHDRAWAL_QUERY_LIMIT: "1000"                  # predefined

      DOGEOS_L1_INTERFACE_RUN_MIGRATIONS: "true"                              # predefined

      DOGEOS_L1_INTERFACE_DOGECOIN_RPC__URL: "http://dogecoin-testnet:44555"  # DOGEOS_WITHDRAWAL_DOGECOIN_RPC_URL
      DOGEOS_L1_INTERFACE_DOGECOIN_RPC__BLOCKBOOK_URL: "http://blockbook-testnet:19139"      # default

      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__START_HEIGHT: "8208200"           # DOGEOS_WITHDRAWAL_DOGECOIN_INDEXER__START_HEIGHT
      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__CONFIRMATIONS: "6"                # predefined
      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__INDEX_UTXOS: "false"              # predefined
      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__INDEX_WITHDRAWALS: "true"         # predefined
      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__INDEX_DEPOSITS: "true"            # predefined
      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__POLL_INTERVAL_MS: "10000"         # predefined
      DOGEOS_L1_INTERFACE_DOGECOIN_INDEXER__BRIDGE_ADDRESS: ""                # DOGEOS_WITHDRAWAL_BRIDGE_ADDRESS

      DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__DA_RPC_URL: "http://celestia-testnet-mocha:26658"  # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__DA_RPC_URL
      DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__NAMESPACE_ID: ""                  # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__DA_NAMESPACE
      DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__START_BLOCK: "8200000"            # DOGEOS_WITHDRAWAL_CELESTIA_INDEXER__START_BLOCK
      DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__CONFIRMATIONS: "3"                # predefined
      DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__POLL_INTERVAL_MS: "15000"         # predefined
      DOGEOS_L1_INTERFACE_CELESTIA_INDEXER__STORE_RAW_BLOB_DATA: "true"       # predefined

# External Secrets configuration for production
externalSecrets:
  l1-interface-secret-env:
    provider: "aws"
    data:
      - remoteRef:
          key: "dogeos/l1-interface-secret-env"
          property: "DOGEOS_L1_INTERFACE_DOGECOIN_RPC__USER"
        secretKey: "DOGEOS_L1_INTERFACE_DOGECOIN_RPC__USER"
      - remoteRef:
          key: "dogeos/l1-interface-secret-env"
          property: "DOGEOS_L1_INTERFACE_DOGECOIN_RPC__PASS"
        secretKey: "DOGEOS_L1_INTERFACE_DOGECOIN_RPC__PASS"
    refreshInterval: "2m"
    serviceAccount: "external-secrets"

# Production resource limits
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

# Storage size override for production
persistence:
  data:
    size: "10Gi"

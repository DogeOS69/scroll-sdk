global:
  nameOverride: &app_name l1-interface
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/l1-interface
  pullPolicy: Always
  tag: 110625-00

service:
  main:
    enabled: true
    ports:
      jsonrpc:
        enabled: true
        port: 8545
        targetPort: 8545
        protocol: TCP
      beacon:
        enabled: true
        port: 5052
        targetPort: 5052
        protocol: TCP
      http:
        enabled: true
        port: 9090
        targetPort: 9090
        protocol: TCP
      admin:
        enabled: true
        port: 9091
        targetPort: 9091
        protocol: TCP

probes:
  liveness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/api/v1/health/live"
        port: http
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
  readiness:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/health"
        port: http
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
  startup:
    enabled: true
    custom: true
    spec:
      httpGet:
        path: "/health"
        port: http
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 60

# Resource configuration
resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Persistent storage configuration
persistence:
  data:
    enabled: true
    type: pvc
    mountPath: /data
    accessMode: ReadWriteOnce
    size: 1Gi
    retain: true

command: ["/usr/local/bin/l1_interface"]

# Application env/config is intentionally supplied by deployment values such as
# examples/values/l1-interface-production.yaml.

# Monitoring configuration
serviceMonitor:
  main:
    enabled: true
    endpoints:
      - port: http
        scheme: http
        path: /api/v1/metrics
        interval: 10s
        scrapeTimeout: 5s

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "testnet-activity-helper.fullname" . }}
  labels:
    {{- include "testnet-activity-helper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "testnet-activity-helper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "testnet-activity-helper.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dependencies.waitFor.enabled }}
      serviceAccountName: {{ include "testnet-activity-helper.fullname" . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
      {{- if .Values.dependencies.waitFor.enabled }}
      - name: wait-for-contracts
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for contracts deployment to complete..."
          POD_PATTERN="{{ .Values.dependencies.waitFor.contracts.podNamePattern }}"
          NAMESPACE="{{ .Values.dependencies.waitFor.contracts.namespace }}"
          TIMEOUT="{{ .Values.dependencies.waitFor.timeout }}"
          
          echo "Looking for pods matching pattern: $POD_PATTERN"
          
          # Wait for any pod matching the pattern to complete with Succeeded status
          end_time=$(($(date +%s) + TIMEOUT))
          while [ $(date +%s) -lt $end_time ]; do
            # Find pods matching the pattern
            MATCHING_PODS=$(kubectl get pods -n $NAMESPACE --no-headers -o custom-columns=":metadata.name" | grep -E ".*-contracts-deployment$" || true)
            
            if [ -z "$MATCHING_PODS" ]; then
              echo "No contracts deployment pods found, waiting..."
              sleep 10
              continue
            fi
            
            echo "Found matching pods: $MATCHING_PODS"
            
            # Check each matching pod
            for POD_NAME in $MATCHING_PODS; do
              POD_PHASE=$(kubectl get pod $POD_NAME -n $NAMESPACE -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
              echo "Pod $POD_NAME phase: $POD_PHASE"
              
              if [ "$POD_PHASE" = "Succeeded" ]; then
                echo "Contracts deployment completed successfully! ($POD_NAME)"
                exit 0
              elif [ "$POD_PHASE" = "Failed" ]; then
                echo "Contracts deployment failed! ($POD_NAME)"
                kubectl logs $POD_NAME -n $NAMESPACE || true
                exit 1
              fi
            done
            
            echo "Contracts deployment pods still running, waiting for completion..."
            sleep 10
          done
          
          echo "Timeout waiting for contracts deployment to complete"
          exit 1
      {{- end }}
      {{- if or .Values.config.ACTIVITY_HELPER_PRIVATE_KEY .Values.externalSecrets }}
      - name: config-merger
        image: busybox:latest
        command: 
        - sh
        - -c
        - |
          # Check if config private key is provided and not empty
          CONFIG_PRIVATE_KEY="{{ .Values.config.ACTIVITY_HELPER_PRIVATE_KEY }}"
          
          if [ -n "$CONFIG_PRIVATE_KEY" ] && [ "$CONFIG_PRIVATE_KEY" != "" ]; then
            echo "Using ACTIVITY_HELPER_PRIVATE_KEY from config"
            PRIVATE_KEY="$CONFIG_PRIVATE_KEY"
          {{- if .Values.externalSecrets }}
          else
            echo "Using ACTIVITY_HELPER_PRIVATE_KEY from external secrets"
            PRIVATE_KEY=$(cat /secrets/ACTIVITY_HELPER_PRIVATE_KEY)
          {{- else }}
          else
            echo "Error: No ACTIVITY_HELPER_PRIVATE_KEY provided in config and no externalSecrets configured"
            exit 1
          {{- end }}
          fi
          
          RPC_ENDPOINT="{{ .Values.config.externalRpcUriL2 }}"
          
          echo "[accounts]" > /app-config/config.toml
          echo "DEPLOYER_PRIVATE_KEY = \"$PRIVATE_KEY\"" >> /app-config/config.toml
          echo "" >> /app-config/config.toml
          echo "[frontend]" >> /app-config/config.toml
          echo "EXTERNAL_RPC_URI_L2 = \"$RPC_ENDPOINT\"" >> /app-config/config.toml
          
          echo "Generated config.toml:"
          cat /app-config/config.toml
        volumeMounts:
        {{- if and .Values.externalSecrets (or (not (hasKey .Values.config "ACTIVITY_HELPER_PRIVATE_KEY")) (eq .Values.config.ACTIVITY_HELPER_PRIVATE_KEY "")) }}
        - name: secrets
          mountPath: /secrets
        {{- end }}
        - name: app-config
          mountPath: /app-config
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["npm", "run", "start"]
        volumeMounts:
        - name: {{ if or .Values.config.ACTIVITY_HELPER_PRIVATE_KEY .Values.externalSecrets }}app-{{ end }}config
          mountPath: /app/config.toml
          subPath: config.toml
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      volumes:
      {{- if or .Values.config.ACTIVITY_HELPER_PRIVATE_KEY .Values.externalSecrets }}
      - name: app-config
        emptyDir: {}
      {{- end }}
      {{- if and .Values.externalSecrets (or (not (hasKey .Values.config "ACTIVITY_HELPER_PRIVATE_KEY")) (eq .Values.config.ACTIVITY_HELPER_PRIVATE_KEY "")) }}
      {{- range $name, $config := .Values.externalSecrets }}
      - name: secrets
        secret:
          secretName: {{ $name }}
      {{- end }}
      {{- else if or (not (hasKey .Values.config "ACTIVITY_HELPER_PRIVATE_KEY")) (eq .Values.config.ACTIVITY_HELPER_PRIVATE_KEY "") }}
      - name: config
        secret:
          secretName: {{ include "testnet-activity-helper.fullname" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }} 
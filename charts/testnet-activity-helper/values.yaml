---
global:
  nameOverride: &app_name testnet-activity-helper
  fullnameOverride: *app_name

# Controller configuration (using common structure)
controller:
  enabled: true
  type: deployment
  replicas: 1
  strategy: Recreate

# Image configuration
image:
  repository: dogeos69/testnet-activity-helper
  pullPolicy: IfNotPresent
  # It is recommended to use a specific tag instead of latest.
  tag: "devnet-06182025-01"  # Defaults to .Chart.AppVersion if not set

imagePullSecrets: []

# Service configuration (disabled for this app)
service:
  main:
    enabled: false

# ConfigMaps configuration (using common structure)
configMaps:
  config:
    enabled: true
    nameOverride: config
    data:
      config.toml: |
        [accounts]
        # This will be overridden by init container
        DEPLOYER_PRIVATE_KEY = ""

        [frontend]
        EXTERNAL_RPC_URI_L2 = "{{ .Values.config.externalRpcUriL2 }}"

# Secrets configuration (using common structure)
secrets:
  key:
    enabled: true
    nameOverride: key
    stringData:
      ACTIVITY_HELPER_PRIVATE_KEY: "{{ .Values.config.ACTIVITY_HELPER_PRIVATE_KEY }}"

# Service Account (not needed for current functionality)
serviceAccount:
  create: false
  name: ""

# Dependencies configuration - when enabled, use custom deployment
dependencies:
  # Runtime dependency checks - wait for any version of contracts to complete
  waitFor:
    enabled: true
    timeout: 1800  # seconds
    contracts:
      # Match pods with this pattern (supports any release name)
      podNamePattern: "*-contracts-deployment"  # Pattern to match contracts deployment pods

# Application-specific configuration
config:
  ACTIVITY_HELPER_PRIVATE_KEY: ""
  externalRpcUriL2: "http://l2-rpc:8545"

# External Secrets configuration
externalSecrets:
  testnet-activity-helper-secret-env:
    provider: aws
    region: us-west-2
    data:
      - remoteRef:
          key: dogeos/testnet-activity-helper-secret-env
          property: private-key
        secretKey: ACTIVITY_HELPER_PRIVATE_KEY
    refreshInterval: 2m
    serviceAccount: external-secrets

# Resources
resources:
  limits:
    cpu: 100m  # Allow burst capacity
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

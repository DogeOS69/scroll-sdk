global:
  nameOverride: &app_name tso-service
  fullnameOverride: *app_name

controller:
  type: statefulset
  replicas: 1
  strategy: RollingUpdate

image:
  repository: dogeos69/tso-service
  pullPolicy: Always
  tag: 110625-00

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 3000

defaultProbes: &default_probes
  enabled: true
  custom: true
  spec:
    httpGet:
      path: "/health"
      port: http

probes:
  liveness:
    <<: *default_probes
  readiness:
    <<: *default_probes
  startup:
    <<: *default_probes
    spec:
      httpGet:
        path: "/health"
        port: http
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 12

# Application env/config is intentionally supplied by deployment values such as
# examples/values/tso-service-production.yaml.

# Resource configuration
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Monitoring configuration
serviceMonitor:
  main:
    enabled: false

ingress:
  main:
    enabled: true
    primary: true
    annotations: {}
    labels: {}
    ingressClassName: "nginx"
    hosts:
      - host: tso.scrollsdk
        paths:
          - path: /
            pathType: Prefix

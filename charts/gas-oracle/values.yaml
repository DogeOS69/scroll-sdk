---
global:
  nameOverride: &app_name gas-oracle
  fullnameOverride: *app_name

image:
  repository: dogeos69/fee-oracle
  pullPolicy: IfNotPresent
  tag: 080625-0

command:
  - "/usr/local/bin/fee_oracle"
  - "--config"
  - "/config/fee_oracle.toml"

podLabels:
  app: *app_name
  dbaccess: "true"

resources:
  requests:
    memory: "100Mi"
    cpu: "50m"
  limits:
    memory: "500Mi"
    cpu: "100m"

persistence:
  wait-for-l1-script:
    enabled: true
    type: configMap
    name: wait-for-l1-script
    defaultMode: "0777"
  fee-oracle-config:
    enabled: true
    type: configMap
    mountPath: /config/fee_oracle.toml
    name: fee-oracle-config
    subPath: fee_oracle.toml

service:
  main:
    enabled: true
    ports:
      http:
        enabled: true
        port: 80
      metrics:
        enabled: true
        port: 8090
        targetPort: 8090

defaultProbes: &default_probes
  enabled: true
  custom: true
  spec:
    httpGet:
      path: "/health"
      port: 8090

probes:
  liveness:
    <<: *default_probes
  readiness:
    <<: *default_probes
  startup:
    <<: *default_probes

env:
  - name: METRICS_PORT
    value: 8090

envFrom:
  - configMapRef:
      name: gas-oracle-env

initContainers:
  1-wait-for-l1:
    image: scrolltech/scroll-alpine:v0.0.1
    command:
      - /bin/sh
      - -c
      - /wait-for-l1.sh $SCROLL_L1_RPC
    envFrom:
      - configMapRef:
          name: gas-oracle-env
    volumeMounts:
      - name: wait-for-l1-script
        mountPath: /wait-for-l1.sh
        subPath: wait-for-l1.sh
  2-wait-for-l2-sequencer:
    image: atkrad/wait4x:latest
    args:
      - http
      - http://l2-sequencer:8545
      - --expect-status-code
      - "200"
      - --timeout
      - "0"

configMaps:
  env:
    enabled: true
    data:
      SCROLL_L1_RPC: ""
      SCROLL_L2_RPC: ""

serviceMonitor:
  main:
    enabled: true
    labels:
      release: scroll-sdk
    serviceName: '{{ include "scroll.common.lib.chart.names.fullname" $ }}'
    endpoints:
      - port: metrics
        interval: 1m
        scrapeTimeout: 10s

feeOracleConfig: |
  # Fee Oracle Configuration
  # Override this configuration in your values file

dogecoinConf:
  rpcuser: user
  testnet: 1
  txindex: 1
  rpcallowip:
    # Option 1: Allow all (NOT recommended for production)
    - 0.0.0.0/0

service:
  port: 44556             # 44556 for testnet, 22556 for mainnet
  rpcPort: 44555          # 44555 for testnet, 22555 for mainnet

# Storage
storage:
  size: 50Gi              # Should be > 200Gi for mainnet
  retainPvcOnUninstall: true
# Enable ingress
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "TCP"
  hosts:
    - host: dogecoin.testnet.dogeos.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dogecoin-tls
      hosts:
        - dogecoin.testnet.dogeos.com

 # RPC Password Configuration for Production
# Option 1: Use External Secrets (Recommended for enterprise environments)
externalSecrets:
  dogecoin-secret-env:
    provider: aws
    serviceAccount: external-secrets
    refreshInterval: 2m
    data:
      - remoteRef:
          key: scroll/dogecoin-production/rpc-credentials
          property: DOGECOIN_RPC_PASSWORD
        secretKey: password

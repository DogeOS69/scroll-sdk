apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dogecoin.fullname" . }}
  labels:
    {{- include "dogecoin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0  # No extra pods during update
      maxUnavailable: 1  # Allow one pod to be down
  selector:
    matchLabels:
      {{- include "dogecoin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dogecoin.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Inject the secret into the config file
          command:
            - /bin/sh
            - -c
            - |
              set -e  # Exit on any error
              echo "Starting Dogecoin container setup..."
              
              # Verify required files exist
              if [ ! -f "/etc/dogecoin.conf" ]; then
                echo "ERROR: dogecoin.conf not found"
                exit 1
              fi
              
              if [ ! -f "/etc/dogecoin-secrets/{{ .Values.rpcPassword.secretKey }}" ]; then
                echo "ERROR: RPC password secret not found"
                exit 1
              fi
              
              # Copy configuration file
              echo "Copying configuration file..."
              cp /etc/dogecoin.conf /tmp/dogecoin.conf
              
              # Add RPC password from secret
              echo "Adding RPC password..."
              RPC_PASSWORD=$(cat /etc/dogecoin-secrets/{{ .Values.rpcPassword.secretKey }})
              if [ -z "$RPC_PASSWORD" ]; then
                echo "ERROR: RPC password is empty"
                exit 1
              fi
              echo "rpcpassword=$RPC_PASSWORD" >> /tmp/dogecoin.conf
              
              echo "Configuration complete. Starting dogecoind..."
              exec /dogecoin/bin/dogecoind -conf=/tmp/dogecoin.conf -datadir=/dogecoin-data
          lifecycle:
            preStop:
              exec:
                command:
                  - /dogecoin/bin/dogecoin-cli
                  - -conf=/tmp/dogecoin.conf
                  - stop
          volumeMounts:
            - name: config-volume
              mountPath: /etc/dogecoin.conf
              subPath: dogecoin.conf
            - name: secret-volume
              mountPath: /etc/dogecoin-secrets
            - name: dogecoin-data
              mountPath: /dogecoin-data
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          ports:
            - name: dogecoind
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: rpc
              containerPort: {{ .Values.service.rpcPort }}
              protocol: TCP
          livenessProbe:
            initialDelaySeconds: 300
            periodSeconds: 60
            timeoutSeconds: 30
            tcpSocket:
              port: rpc
          readinessProbe:
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            tcpSocket:
              port: rpc
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "dogecoin.fullname" . }}-config
        - name: secret-volume
          secret:
            {{- if .Values.externalSecrets }}
            {{- $secretName := "" }}
            {{- range $key, $value := .Values.externalSecrets }}
            {{- $secretName = $key }}
            {{- break }}
            {{- end }}
            secretName: {{ $secretName }}
            {{- else }}
            secretName: {{ include "dogecoin.fullname" . }}-rpc-secret
            {{- end }}
        - name: dogecoin-data
          persistentVolumeClaim:
            claimName: {{ include "dogecoin.fullname" . }}-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
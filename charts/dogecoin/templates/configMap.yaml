apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dogecoin.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
data:
  dogecoin.conf: |
    {{- range $key, $val := .Values.dogecoinConf }}
    {{- if eq $key "rpcallowip" }}
    {{- range $val }}
    {{ $key }}={{ . }}
    {{- end }}
    {{- else if or (eq $key "zmqpubrawblock") (eq $key "zmqpubrawtx") (eq $key "zmqpubhashtx") (eq $key "zmqpubhashblock") }}
    {{ $key }}={{ $val }}
    {{- else }}
    {{ $key }}={{ $val }}
    {{- end }}
    {{- end }}
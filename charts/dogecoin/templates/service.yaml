apiVersion: v1
kind: Service
metadata:
  name: {{ include "dogecoin.fullname" . }}
  labels:
    {{- include "dogecoin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: dogecoind
      port: {{ .Values.service.port }}
      targetPort: dogecoind  # Matches Deployment's named port
      protocol: TCP
    - name: rpc
      port: {{ .Values.service.rpcPort }}
      targetPort: rpc  # Matches Deployment's named port
      protocol: TCP
    - name: zmq-rawblock
      port: {{ .Values.service.zmqRawBlockPort }}
      targetPort: zmq-rawblock  # Matches Deployment's named port
      protocol: TCP
    - name: zmq-rawtx
      port: {{ .Values.service.zmqRawTxPort }}
      targetPort: zmq-rawtx  # Matches Deployment's named port
      protocol: TCP
    - name: zmq-hashtx
      port: {{ .Values.service.zmqHashTxPort }}
      targetPort: zmq-hashtx  # Matches Deployment's named port
      protocol: TCP
    - name: zmq-hashblock
      port: {{ .Values.service.zmqHashBlockPort }}
      targetPort: zmq-hashblock  # Matches Deployment's named port
      protocol: TCP
  selector:
    {{- include "dogecoin.selectorLabels" . | nindent 4 }}
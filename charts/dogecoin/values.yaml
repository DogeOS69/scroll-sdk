replicaCount: 1
namespace: default

dogecoinConf:
  disablewallet: 1
  rpcuser: user
  server: 1
  testnet: 1
  printtoconsole: 1
  rpcbind: 0.0.0.0        # Bind to all interfaces for cluster access
  rpcallowip:             # Allow cluster pod CIDR (adjust if needed)
    - 192.168.0.0/16
    - 10.100.0.0/16
  listen: 0

# RPC password configuration
# Primary method: Use External Secrets Operator (recommended for production)
# Fallback: Auto-create secret with provided value (for development/testing only)
rpcPassword:
  secretKey: "password"   # Key in the secret containing the password
  value: "password"       # Fallback value for development (used only if no externalSecrets)

# External Secrets configuration (recommended for production)
# Uses External Secrets Operator to fetch secrets from external systems
externalSecrets: {}
# Example configuration for AWS Secrets Manager:
# externalSecrets:
#   dogecoin-rpc-secret:
#     provider: aws
#     serviceAccount: external-secrets
#     refreshInterval: 2m
#     data:
#       - remoteRef:
#           key: dogecoin/rpc-credentials
#           property: password
#         secretKey: password

image:
  repository: "docker.io/dogeos69/dogecoin"
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  # tag: "1.14.9"

service:
  type: ClusterIP
  port: 44556             # 44556 for testnet, 22556 for mainnet
  rpcPort: 44555          # 44555 for testnet, 22555 for mainnet

# Storage
storage:
  size: 50Gi              # Should be > 200Gi for mainnet
  retainPvcOnUninstall: false # Set to true to keep the PVC when the Helm chart is uninstalled.
  storageClassName: gp3-immediate      # Storage class with immediate binding

nodeSelector: {}

tolerations: []

affinity: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "TCP"
  hosts:
    - host: dogecoin.testnet.dogeos.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dogecoin-tls
      hosts:
        - dogecoin.testnet.dogeos.com

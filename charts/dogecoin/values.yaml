replicaCount: 1

nameOverride: dogecoin
fullnameOverride: dogecoin

dogecoinConf:
  disablewallet: 1
  rpcuser: user
  server: 1
  testnet: 1
  printtoconsole: 1
  rpcbind: 0.0.0.0        # Bind to all interfaces for cluster access
  rpcallowip:             # Allow cluster pod CIDR (adjust if needed)
    - 192.168.0.0/16
    - 10.100.0.0/16
  listen: 0
  # ZMQ configuration for real-time blockchain data streaming
  zmqpubrawblock: "tcp://0.0.0.0:28332"
  zmqpubrawtx: "tcp://0.0.0.0:28333"
  zmqpubhashtx: "tcp://0.0.0.0:28334"
  zmqpubhashblock: "tcp://0.0.0.0:28335"

# RPC password configuration
# Primary method: Use External Secrets Operator (recommended for production)
# Fallback: Auto-create secret with provided value (for development/testing only)
rpcPassword:
  secretKey: "password"   # Key in the secret containing the password
  value: "password"       # Fallback value for development (used only if no externalSecrets)

# External Secrets configuration (recommended for production)
# Uses External Secrets Operator to fetch secrets from external systems
externalSecrets: {}
# Example configuration for AWS Secrets Manager:
# externalSecrets:
#   dogecoin-rpc-secret:
#     provider: aws
#     serviceAccount: external-secrets
#     refreshInterval: 2m
#     data:
#       - remoteRef:
#           key: dogecoin/rpc-credentials
#           property: password
#         secretKey: password

image:
  repository: "docker.io/dogeos69/dogecoin"
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  # tag: "1.14.9"

service:
  type: ClusterIP
  port: 44556             # 44556 for testnet, 22556 for mainnet
  rpcPort: 44555          # 44555 for testnet, 22555 for mainnet
  # ZMQ ports for real-time blockchain data streaming
  zmqRawBlockPort: 28332
  zmqRawTxPort: 28333
  zmqHashTxPort: 28334
  zmqHashBlockPort: 28335

# Storage
storage:
  existingClaim: ""        # Optional single-replica existing PVC name. Defaults to <release-name>-data for backward-compatible upgrades.
  size: 50Gi              # Should be > 200Gi for mainnet
  storageClassName: ""    # Use cluster default storage class (more portable)
  retainPvcOnUninstall: true           # IMPORTANT: Keep PVC when uninstalling to prevent data loss

nodeSelector: {}

tolerations: []

affinity: {}

# Ingress configuration
ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "TCP"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"  # Uncomment for SSL
  hosts:
    - host: dogecoin.example.com  # Replace with your domain
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: dogecoin-tls
      hosts:
        - dogecoin.example.com  # Replace with your domain

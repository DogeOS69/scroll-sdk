replicaCount: 1

fullnameOverride: dogecoin

dogecoinConf:
  disablewallet: 1
  rpcuser: user
  server: 1
  testnet: 0
  printtoconsole: 0
  rpcbind: 0.0.0.0  # Bind to all interfaces for cluster access
  rpcallowip: # Allow cluster pod CIDR (adjust if needed)
    - 192.168.0.0/16
    - 10.100.0.0/16
  listen: 0
  # ZMQ configuration for real-time blockchain data streaming
  zmqpubrawblock: "tcp://0.0.0.0:28332"
  zmqpubrawtx: "tcp://0.0.0.0:28333"
  zmqpubhashtx: "tcp://0.0.0.0:28334"
  zmqpubhashblock: "tcp://0.0.0.0:28335"

# RPC password configuration - fixed to match values.yaml structure
rpcPassword:
  secretKey: "password"   # Key in the secret containing the password
  value: "mainnet_secure_password_here"  # Use a secure password for mainnet

image:
  repository: "docker.io/dogeos69/dogecoin"
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  # tag: "1.14.9"

service:
  type: ClusterIP
  port: 22556 # 44556 for testnet, 22556 for mainnet
  rpcPort: 22555  # 44555 for testnet, 22555 for mainnet
  # ZMQ ports for real-time blockchain data streaming
  zmqRawBlockPort: 28332
  zmqRawTxPort: 28333
  zmqHashTxPort: 28334
  zmqHashBlockPort: 28335

# Storage
storage:
  existingClaim: "" # Optional existing PVC name. Defaults to <release-name>-data for backward-compatible upgrades.
  size: 250Gi # Should be > 200Gi for mainnet
  storageClassName: "" # Use cluster default storage class (more portable)
  retainPvcOnUninstall: true # IMPORTANT: Keep PVC when uninstalling to prevent data loss

nodeSelector: {}

tolerations: []

affinity: {}

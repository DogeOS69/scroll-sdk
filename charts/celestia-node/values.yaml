network: "mocha"
node_type: "bridge"
core:
  rpc_url: rpc-mocha.pops.one
  grpc_port: 9090

# Optional: Your wallet's mnemonic phrase for key restoration
# If not provided, a random key will be generated on first startup and persisted
# use --set mnemonic="<your mnemonic here>" to set the mnemonic via helm install
mnemonic: ""

share:
  useExchange: true
  # Number of peers to sample for data availability sampling
  sampleSize: 8
  # Minimum number of successful responses required
  minSamples: 2
  # Concurrency limit for data availability sampling
  concurrencyLimit: 8

header:
  trustedPeers: []
  trustedHeight: 0
  syncFromHash: null

daser:
  enabled: true
  samplingRange: 128

pruner:
  enableService: false

image:
  repository: "ghcr.io/celestiaorg/celestia-node"
  tag: "v0.26.1-mocha"
  pullPolicy: IfNotPresent

storage:
  size: "200Gi"
  # Set to true to keep the PersistentVolumeClaim when the Helm chart is uninstalled.
  retainPvcOnUninstall: true

service:
  type: "ClusterIP"
  ports:
    p2p-tcp:
      enabled: true
      port: 2121
      targetPort: 2121
      protocol: TCP
    p2p-udp:
      enabled: true
      port: 2121
      targetPort: 2121
      protocol: UDP
    rpc:
      enabled: true
      port: 26658
      targetPort: 26658
      protocol: TCP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: "celestia.testnet.dogeos.com"
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - secretName: "celestia-tls"
      hosts:
        - "celestia.testnet.dogeos.com"

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "4Gi"

rpc:
  auth:
    skipAuth: true

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "blockbook.fullname" . }}-data
  labels:
    {{- include "blockbook.labels" . | nindent 4 }}
  {{- if .Values.storage.retainPvcOnUninstall }}
  annotations:
    "helm.sh/resource-policy": keep
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.storage.storageClassName }}
  storageClassName: {{ .Values.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.size }}

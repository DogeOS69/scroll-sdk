grafana:
  enabled: true
  fullnameOverride: grafana
  nameOverride: grafana
  adminUser: admin
  adminPassword: scroll-sdk
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      jsonData:
        maxLines: 5000
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-prometheus:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: 30s
        - name: Loki
          type: loki
          url: http://loki:3100
          access: proxy
          jsonData:
            httpHeaderName1: 'X-Scope-OrgID'
          secureJsonData:
            httpHeaderValue1: '1'
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'scroll'
          orgId: 1
          folder: 'scroll'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/scroll/
        - name: 'kubernetes'
          orgId: 1
          folder: 'kubernetes'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/kubernetes/
        - name: 'dogeos'
          orgId: 1
          folder: 'dogeos'
          type: file
          disableDeletion: false
          allowUiUpdates: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/dogeos/
        - name: 'blockscout'
          orgId: 1
          folder: 'blockscout'
          type: file
          disableDeletion: false
          allowUiUpdates: true
          editable: true
          options:
            path: /var/lib/grafana/dashboards/blockscout/
  dashboardsConfigMaps:
    scroll: grafana-scroll-dashboards
    kubernetes: grafana-kubernetes-dashboards
    dogeos: grafana-dogeos-dashboards
    blockscout: grafana-blockscout-dashboards
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - "grafana.scrollsdk"
  extraConfigmapMounts:
    - name: grafana-alerts
      mountPath: /etc/grafana/provisioning/alerting/provisioned_alerts.yaml
      subPath: provisioned_alerts.yaml
      configMap: grafana-alerts-config
  persistence:
    enabled: true
    type: pvc
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    storageClassName: ""
    annotations:
      "helm.sh/resource-policy": keep

dashboards:
  bundled:
    # Set false when dashboard ConfigMaps are managed outside this chart and
    # referenced through grafana.dashboardsConfigMaps.
    enabled: true

alerts:
  bundled:
    # Set false when Grafana alert provisioning is managed outside this chart
    # and mounted through grafana.extraConfigmapMounts.
    enabled: true

loki:
  enabled: false
  fullnameOverride: loki
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: 'filesystem'
    limits_config:
      retention_period: 14d
    compactor:
      retention_enabled: true
      compaction_interval: 10m
      delete_request_store: filesystem
      retention_delete_delay: 2h
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          index:
            prefix: loki_index_
            period: 24h
          object_store: filesystem
          schema: v13
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      enableStatefulSetAutoDeletePVC: false
  read:
    replicas: 0
  backend:
    replicas: 0
  write:
    replicas: 0

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
        tenant_id: 1

kube-prometheus-stack:
  enabled: true
  nameOverride: prometheus
  fullnameOverride: prometheus
  prometheus:
    enabled: true
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi
      alerting:
        alertmanagers:
          - name: alertmanager-main
            namespace: default
            port: web
      serviceMonitorSelector:
        matchExpressions:
          - key: app.kubernetes.io/instance
            operator: Exists

  alertmanager:
    enabled: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi
  grafana:
    enabled: false

  prometheus-node-exporter:
    nameOverride: node-exporter
    fullnameOverride: node-exporter
  kube-state-metrics:
    nameOverride: kube-state-metrics
    fullnameOverride: kube-state-metrics

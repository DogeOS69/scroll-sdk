{{- if .Values.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-scroll-dashboards
  labels:
    grafana_dashboard: "1"
data:
{{ (.Files.Glob "grafana/scroll-dashboards/*.json").AsConfig | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-kubernetes-dashboards
  labels:
    grafana_dashboard: "2"
data:
{{ (.Files.Glob "grafana/kubernetes-dashboards/*.json").AsConfig | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dogeos-dashboards
  labels:
    grafana_dashboard: "3"
data:
{{ (.Files.Glob "grafana/dogeos-dashboards/*.json").AsConfig | indent 2 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-blockscout-dashboards
  labels:
    grafana_dashboard: "4"
data:
{{ (.Files.Glob "grafana/blockscout-dashboards/*.json").AsConfig | indent 2 }}

{{- end }}

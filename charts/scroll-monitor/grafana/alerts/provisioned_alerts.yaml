# # config file version
apiVersion: 1
# List of rule groups to import or update
groups:
    - orgId: 1
      name: dogeos alert provisioned
      folder: dogeos
      interval: 1m
      rules:
        - uid: eemuhs8xgrjlsf
          #OK
          title: Error Json Log Alert(Paused)
          condition: B
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: P8E80F9AEF21F6940
              model:
                datasource:
                    type: loki
                    uid: P8E80F9AEF21F6940
                editorMode: code
                expr: sum by (service, level, message)(count_over_time({service=~".*(cubesigner).*", level=~"(?i)warn|error"} | pattern "<_>{<message>}"[10m]))
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            summary: 'Occurrences: {{ $values.A.Value }}'
          labels: {}
          isPaused: true
          notification_settings:
            receiver: dogeos default slack alert
            repeat_interval: 5m
        - uid: een2zs3umqscga
          #OK
          title: Error Log Alert(Paused)
          condition: B
          data:
            - refId: A
              queryType: instant
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: P8E80F9AEF21F6940
              model:
                datasource:
                    type: loki
                    uid: P8E80F9AEF21F6940
                editorMode: code
                expr: sum by (service, level, message)(count_over_time({service=~"(da-publisher)|(withdrawal-processor)|(tso-service)|(l1-interface)|(fee-oracle)"} | decolorize | detected_level=~`warn|error` | regexp ".*?(?P<level>(WARN|ERROR)).*? (?P<message>.*)"[10m]))
                intervalMs: 1000
                maxDataPoints: 43200
                queryType: instant
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 0s
          annotations:
            summary: 'Occurrences: {{ $values.A.Value }}'
          labels: {}
          isPaused: true
          notification_settings:
            receiver: dogeos default slack alert
            repeat_interval: 5m
        - uid: den31ekvqabr4a
          #OK
          title: Low Indexing Height(Paused)
          condition: D
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                exemplar: false
                # dogecoin_synced_headers_total is exported by metrics-exporter from getblockchaininfo.headers
                expr: sum by(service) (label_replace(dogecoin_synced_headers_total, "service", "l1-interface", "", ""))
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                datasource:
                    type: prometheus
                    uid: PBFA97CFB590B2093
                editorMode: code
                #rename dogeos_deposit_processor_current_indexer_height=>indexer_dogecoin_last_synced_block
                expr: sum by(service) (indexer_dogecoin_last_synced_block)
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: B
            - refId: D
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 3
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: C
                intervalMs: 1000
                maxDataPoints: 43200
                refId: D
                type: threshold
            - refId: C
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: $A-$B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: math
          noDataState: NoData
          execErrState: Error
          for: 0s
          annotations:
            summary: |-
                Dogecoin height:  {{ printf "%.0f" $values.A.Value }}
                DogeOS indexer height:  {{ printf "%.0f" $values.B.Value }}
                Difference: {{ printf "%.0f" $values.C.Value }}
          labels: {}
          isPaused: true
          notification_settings:
            receiver: dogeos default slack alert
            repeat_interval: 5m
        - uid: aeni86j0olzpce

                High latency for TEE signers in past 15 minutes
                Average latency: {{ humanize $values.A.Value }} seconds
                Max latency: {{ humanize $values.B.Value }} seconds
                Min latency: {{ humanize $values.D.Value }} seconds
          labels: {}
          isPaused: true
          notification_settings:
            receiver: dogeos default slack alert
            repeat_interval: 5m
        - uid: beps65bnpp98ga
          title: Next Batch Height Behind(Paused)
          condition: D
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                exemplar: false
                #rollup_last_batch_index from metrics exporter
                expr: sum by(service) (label_replace(rollup_last_batch_index, "service", "withdrawal-processor", "", ""))

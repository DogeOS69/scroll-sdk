                    uid: PBFA97CFB590B2093
                editorMode: code
                #withdrawal_processor_next_batch_height outdate, use withdrawal_processor_last_processed_batch_height
                expr: sum by(service) (withdrawal_processor_last_processed_batch_height)
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: B
            - refId: D
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:

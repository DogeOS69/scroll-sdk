    - orgId: 1
      name: dogeos critial alert provisioned
      folder: dogeos
      interval: 20s
      rules:
        - uid: feprf4q4x91c0e
          title: Low Fee Wallet UTXOs(Paused)
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: fee_wallet_total_unredeemed_utxo_amount{service="withdrawal-processor"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:

            receiver: dogeos default slack alert
            group_wait: 1s
            group_interval: 1s
            repeat_interval: 1m

# List of contact points to import or update
contactPoints:
    - orgId: 1
      name: dogeos default slack alert
      receivers:
        - uid: demuhr48nt3wgf
          type: slack
          settings:
            text: '{{ template "slack.dogeos.text" . }}'
            title: '{{ template "slack.dogeos.title" . }}'
            url: https://hooks.slack.com/services/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
          disableResolveMessage: false

# List of templates to import or update
templates:
    # <int> organization ID, default = 1
  - orgID: 1
    # <string, required> name of the template, must be unique
    name: template.dogeos.provisioned
    # <string, required> content of the template
    template: "{{ define \"slack.dogeos.title\" -}}\n[{{ if eq .Status \"firing\" }}🔥{{ end }}{{ if eq .Status \"resolved\" }}✅{{ end }}{{ .Status | toUpper -}}\n{{- if eq .Status \"firing\" }}:{{ .Alerts.Firing | len }}{{ if gt (.Alerts.Resolved | len) 0 }}, ✅RESOLVED{{ end }}{{ end -}}\n{{- if gt (.Alerts.Resolved | len) 0 }}:{{ .Alerts.Resolved | len }}{{ end }}] {{ .GroupLabels.alertname -}}\n{{- if .CommonLabels.service }} in {{ .CommonLabels.service -}}\n{{- else }} in {{ if gt (len .Alerts.Firing) 0 }}{{ template \"dogeos_rulename_list\" .Alerts.Firing }}{{ end -}}\n{{- if gt (len .Alerts.Resolved) 0 }}{{ template \"dogeos_rulename_list\" .Alerts.Resolved }}{{ end }}{{ end -}}\n{{ end }}\n\n{{ define \"dogeos_rulename_list\" -}}\n{{- range . }}{{ range .Labels.SortedPairs }}{{ if eq .Name \"rulename\" }}'{{ .Value }}' {{ end }}{{ end }}{{ end -}}\n{{ end }}\n\n{{ define \"slack.dogeos.text\" }}\nHere are details:\n{{ if gt (len .Alerts.Firing) 0 }}🔥🔥🔥 {{ len .Alerts.Firing }} FIRING 🔥🔥🔥\n{{ template \"dogeos_text_alert_list\" .Alerts.Firing }}{{ if gt (len .Alerts.Resolved) 0 }}\n{{ end }}{{ end }}{{ if gt (len .Alerts.Resolved) 0 }}✅✅✅ {{ len .Alerts.Resolved }} RESOLVED ✅✅✅\n{{ template \"dogeos_text_alert_list\" .Alerts.Resolved }}{{ end }}{{ end }}\n\n\n{{ define \"dogeos_text_alert_list\" }}{{ range . }}\nLabels:\n{{ range .Labels.SortedPairs }} - {{ .Name }} = {{ .Value }}\n{{ end }}Annotations:\n{{ range .Annotations.SortedPairs }} - {{ .Name }} = {{ .Value }}\n{{ end }}{{ if gt (len .GeneratorURL) 0 }}Source: {{ .GeneratorURL }}\n{{ end }}{{ if gt (len .SilenceURL) 0 }}Silence: {{ .SilenceURL }}\n{{ end }}{{ if gt (len .DashboardURL) 0 }}Dashboard: {{ .DashboardURL }}\n{{ end }}{{ if gt (len .PanelURL) 0 }}Panel: {{ .PanelURL }}\n{{ end }}{{ end }}{{ end }}"

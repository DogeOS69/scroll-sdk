apiVersion: 1

groups:
  - orgId: 1
    name: dogeos metrics provisioned
    folder: dogeos
    interval: 1m
    rules:
      - uid: dogeos-eth-da-submitter-not-ready
        title: Eth DA submitter is not ready
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: max(eth_da_submitter_ready)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Eth DA submitter readiness is below 1.
          description: eth_da_submitter_ready is {{ printf "%.0f" $values.A.Value }}.
        labels:
          severity: critical
          service: eth-da-submitter
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-eth-da-publish-backlog-stalled
        title: Eth DA publish backlog is stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: max(eth_da_publish_ready_backlog > 0 and eth_da_publish_oldest_ready_age_seconds > 3600)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Eth DA has pending_publish rows older than one hour.
          description: Check eth_da_publish_ready_backlog and eth_da_publish_oldest_ready_age_seconds.
        labels:
          severity: critical
          service: eth-da-submitter
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-eth-da-submit-failures
        title: Eth DA submitter failures increased
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: sum(increase(eth_da_submitter_submission_failures_total[10m])) + sum(increase(eth_da_submitter_cycle_failures_total[10m])) + sum(increase(eth_da_submitter_lifecycle_failures_total[10m])) + sum(increase(eth_da_submitter_l2_reorg_failures_total[10m])) + sum(increase(eth_da_publish_canonicality_events_total[10m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: Eth DA submitter failure counters increased in the last 10 minutes.
          description: Combined failure increase is {{ printf "%.0f" $values.A.Value }}.
        labels:
          severity: critical
          service: eth-da-submitter
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-withdrawal-inbox-worker-failures
        title: Withdrawal processor Ethereum DA inbox worker has failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: max(withdrawal_processor_eth_da_inbox_worker_consecutive_failures)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: Withdrawal processor Ethereum DA inbox worker has consecutive failures.
          description: Max consecutive failure count is {{ printf "%.0f" $values.A.Value }}.
        labels:
          severity: critical
          service: withdrawal-processor
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-withdrawal-inbox-worker-stale
        title: Withdrawal processor Ethereum DA inbox worker observation is stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: time() - max(withdrawal_processor_eth_da_inbox_worker_last_observed_timestamp_seconds)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 900
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Withdrawal processor has not observed an Ethereum DA inbox update recently.
          description: Last observed age is {{ printf "%.0f" $values.A.Value }} seconds.
        labels:
          severity: warning
          service: withdrawal-processor
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 10m

      - uid: dogeos-l1-interface-not-ready
        title: Dogecoin L1 interface is not ready
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: max(l1_interface_service_ready)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: Dogecoin L1 interface readiness is below 1.
        labels:
          severity: critical
          service: l1-interface
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-fee-oracle-stale
        title: Fee oracle latest Ethereum DA oracle value is stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: time() - max(fee_oracle_ethereum_da_oracle_value_latest_computed_at_ms / 1000)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 900
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Fee oracle Ethereum DA oracle value has not updated recently.
          description: Latest computed age is {{ printf "%.0f" $values.A.Value }} seconds.
        labels:
          severity: critical
          service: fee-oracle
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-fee-oracle-errors
        title: Fee oracle errors increased
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: sum(increase(fee_oracle_updates_failed_total[10m])) + sum(increase(fee_oracle_errors_total[10m])) + sum(increase(fee_oracle_chain_rpc_errors_total[10m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: Fee oracle error counters increased in the last 10 minutes.
        labels:
          severity: warning
          service: fee-oracle
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 10m

      - uid: dogeos-tso-no-signers
        title: TSO has no registered signers
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: sum(tso_core_registered_signers_count)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: TSO reports fewer than one registered signer.
        labels:
          severity: critical
          service: tso-service
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 5m

      - uid: dogeos-dogecoin-indexer-lag
        title: Dogecoin indexer is behind node headers
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: PBFA97CFB590B2093
            model:
              editorMode: code
              expr: max(dogecoin_synced_headers_total) - max(dogecoin_indexer_last_synced_block)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 12
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: Dogecoin indexer is more than 12 headers behind the node.
          description: Current lag is {{ printf "%.0f" $values.A.Value }} blocks.
        labels:
          severity: warning
          service: withdrawal-processor
        notification_settings:
          receiver: dogeos default slack alert
          repeat_interval: 10m

contactPoints:
  - orgId: 1
    name: dogeos default slack alert
    receivers:
      - uid: demuhr48nt3wgf
        type: slack
        settings:
          text: '{{ template "slack.dogeos.text" . }}'
          title: '{{ template "slack.dogeos.title" . }}'
          url: https://hooks.slack.com/services/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
        disableResolveMessage: false

templates:
  - orgID: 1
    name: template.dogeos.provisioned
    template: "{{ define \"slack.dogeos.title\" -}}\n[{{ .Status | toUpper }}] {{ .GroupLabels.alertname -}}\n{{- if .CommonLabels.service }} in {{ .CommonLabels.service }}{{ end -}}\n{{ end }}\n\n{{ define \"slack.dogeos.text\" }}\n{{ range .Alerts }}\nLabels:\n{{ range .Labels.SortedPairs }} - {{ .Name }} = {{ .Value }}\n{{ end }}Annotations:\n{{ range .Annotations.SortedPairs }} - {{ .Name }} = {{ .Value }}\n{{ end }}{{ if gt (len .GeneratorURL) 0 }}Source: {{ .GeneratorURL }}\n{{ end }}{{ if gt (len .DashboardURL) 0 }}Dashboard: {{ .DashboardURL }}\n{{ end }}{{ if gt (len .PanelURL) 0 }}Panel: {{ .PanelURL }}\n{{ end }}\n{{ end }}{{ end }}"

                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: B
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
            - refId: B
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params: []
                      reducer:
                        params: []
                        type: avg
                      type: query
                datasource:
                    name: Expression
                    type: __expr__
                    uid: __expr__
                expression: $D - $A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: math
          noDataState: NoData
          execErrState: Error
          for: 0s
          annotations:
            description: |-
                No withdrawal processed in last 5 minutes.
                Last processed withdrawal at {{ humanizeTimestamp $values.A.Value }}
                Last processed withdrawal height: {{ $values.E.Value }}
          labels: {}
          isPaused: true
          notification_settings:
            receiver: dogeos default slack alert
            repeat_interval: 5m
        - uid: fenjrsinwhhq8e
          # wait test
          title: High latency for TEE signers(Paused)
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                editorMode: code
                expr: sum(rate(tso_core_signer_response_latency_seconds_sum{outcome="signed"}[15m])) / sum(rate(tso_core_signer_response_latency_seconds_count{outcome="signed"}[15m]))
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: B
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                datasource:
                    type: prometheus
                    uid: PBFA97CFB590B2093
                editorMode: code
                expr: max( sum by (signer_pubkey) (rate(tso_core_signer_response_latency_seconds_sum{outcome="signed"}[15m])) / sum by (signer_pubkey) (rate(tso_core_signer_response_latency_seconds_count{outcome="signed"}[15m])) )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: B
            - refId: D
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: PBFA97CFB590B2093
              model:
                datasource:
                    type: prometheus
                    uid: PBFA97CFB590B2093
                editorMode: code
                expr: min( sum by (signer_pubkey) (rate(tso_core_signer_response_latency_seconds_sum{outcome="signed"}[15m])) / sum by (signer_pubkey) (rate(tso_core_signer_response_latency_seconds_count{outcome="signed"}[15m])) )
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: D
            - refId: C
              relativeTimeRange:
                from: 900
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 15
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 0s
